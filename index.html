<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE SMASH — Menyplanlegger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --cream: #F5F0E8;
      --gold: #E8C547;
      --bg: #f9f9f7;
      --card: #ffffff;
      --border: #e0ddd8;
      --text: #1a1a1a;
      --muted: #6b6b68;
      --success: #1a7a4a;
      --success-bg: #e8f5ee;
      --warn: #7a5a00;
      --warn-bg: #fff8e0;
      --danger: #a0201a;
      --danger-bg: #fdecea;
      --info-bg: #e8f0fb;
      --info: #1a4a8a;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      background: var(--black);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(255,255,255,.08);
    }
    .logo { display: flex; align-items: baseline; gap: 6px; }
    .logo-the { font-size: 11px; font-weight: 600; letter-spacing: .2em; color: var(--gold); text-transform: uppercase; }
    .logo-smash { font-size: 22px; font-weight: 700; letter-spacing: -.02em; color: var(--cream); }
    .logo-divider { width: 30px; height: 2px; background: var(--gold); margin-left: 8px; flex-shrink: 0; }
    .header-sub { font-size: 12px; color: #888; }
    .save-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,.08); color: #aaa; transition: all .2s; }
    .save-badge.saved { background: rgba(26,122,74,.3); color: #6ddca0; }

    /* LAYOUT */
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

    /* TABS */
    .tab-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .tab {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 13px; cursor: pointer; background: var(--card); color: var(--muted);
      transition: all .15s; white-space: nowrap;
    }
    .tab:hover { border-color: #aaa; color: var(--text); }
    .tab.on { background: var(--black); color: var(--cream); border-color: var(--black); }
    .tab.lib-on { background: var(--info-bg); color: var(--info); border-color: var(--info); }
    .tab.saus-on { background: var(--warn-bg); color: var(--warn); border-color: #d4a000; }
    .tab-add { padding: 6px 14px; border: 1px dashed var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: transparent; color: var(--muted); }
    .tab-add:hover { background: var(--card); }
    .new-badge { font-size: 9px; padding: 1px 5px; border-radius: 10px; background: var(--gold); color: var(--black); margin-left: 4px; vertical-align: middle; }

    /* CARD */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }

    /* FORM */
    .sec { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .sec:first-child { margin-top: 0; }
    .field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .field-label { font-size: 13px; color: var(--muted); min-width: 95px; flex-shrink: 0; }
    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .price-block { display: flex; flex-direction: column; gap: 4px; }
    .price-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    input, textarea, select {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 13px; color: var(--text); background: var(--card); font-family: inherit;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #aaa; }
    textarea { resize: vertical; }

    /* INGREDIENT GRID */
    .ing-header { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1.8fr 56px; gap: 6px; margin-bottom: 4px; }
    .ing-row { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1.8fr 56px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .col-head { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .btn-pair { display: flex; gap: 3px; }
    .icon-btn {
      width: 26px; height: 26px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; cursor: pointer; font-size: 13px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted);
      transition: all .15s;
    }
    .icon-btn:hover.save { background: var(--success-bg); color: var(--success); border-color: var(--success); }
    .icon-btn:hover.del { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
    .add-row {
      width: 100%; padding: 7px; font-size: 13px; cursor: pointer;
      border: 1px dashed var(--border); background: transparent; color: var(--muted);
      border-radius: var(--radius); margin-top: 6px; transition: background .15s;
    }
    .add-row:hover { background: var(--bg); }

    /* PICKER */
    .picker-wrap { position: relative; margin-top: 8px; }
    .picker-dd {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      z-index: 99; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    .picker-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .picker-item:last-child { border-bottom: none; }
    .picker-item:hover { background: var(--bg); }
    .pi-meta { font-size: 11px; color: var(--muted); margin-left: 8px; }

    /* MARGIN BAR */
    .margin-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
      background: var(--bg); border-radius: var(--radius); padding: 14px; margin-top: 12px;
    }
    .mb-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .mb-val { font-size: 20px; font-weight: 700; }

    /* ALLERGENS */
    .al-tag {
      display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px;
      background: var(--bg); color: var(--muted); cursor: pointer; border: 1px solid var(--border);
      margin: 2px; transition: all .15s;
    }
    .al-tag.on { background: var(--danger-bg); color: var(--danger); border-color: #f0b0ae; }

    /* SAUSER */
    .saus-tab-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .saus-tab { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--card); color: var(--muted); }
    .saus-tab.on { background: var(--warn-bg); color: var(--warn); border-color: #d4a000; }
    .step-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--black); color: var(--gold); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* LIBRARY */
    .lib-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr 28px; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .lib-row:last-child { border-bottom: none; }
    .lib-note { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 12px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); }

    /* SIDER */
    .side-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .side-row:last-child { border-bottom: none; }

    /* EXPORT BUTTON */
    .export-btn {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--black); color: var(--cream); border: none; border-radius: var(--radius-lg);
      margin-top: 24px; letter-spacing: .01em; transition: opacity .15s;
    }
    .export-btn:hover { opacity: .85; }
    .export-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--black); color: var(--cream); padding: 10px 20px;
      border-radius: var(--radius); font-size: 13px; z-index: 999;
      opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .tab-del { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px; cursor: pointer; background: transparent; color: var(--danger); margin-left: 6px; }

    @media (max-width: 600px) {
      .ing-header, .ing-row { grid-template-columns: 2fr 0.8fr 0.8fr 28px; }
      .ing-header .col-head:nth-child(4), .ing-row input:nth-child(4) { display: none; }
      .price-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div style="display:flex;flex-direction:column;line-height:1">
      <span class="logo-the">The</span>
      <span class="logo-smash">SMASH</span>
    </div>
    <div class="logo-divider"></div>
    <span class="header-sub">Menyplanlegger</span>
  </div>
  <span class="save-badge" id="save-badge">Laster...</span>
</header>

<div class="container">
  <div class="tab-row" id="main-tabs"></div>
  <div id="main-pane"></div>
  <button class="export-btn" id="export-btn" onclick="exportDocx()">Last ned Word-dokument</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script>
const ALLERGENS = ['Gluten','Egg','Melk','Sennep','Selleri','Soya','Sulfitt','Sesam','N\u00f8tter'];
const SK = 'thesmash-menu-v1';
const LK = 'thesmash-lib-v1';

const DEFAULT = {
  burgers: [
    { id:'classic', name:'The Classic', pris_dobbel:'149', pris_enkel:'109', isNew:false,
      ings:[{n:'Kj\u00f8ttdeig 80/20 (dobbel)',w:'2 \u00d7 80g',c:'18',note:'Chuck/brisket, fersk'},{n:'Brioche bun',w:'85g',c:'6',note:'Lett grilles'},{n:'American cheddar',w:'2 \u00d7 18g',c:'6',note:'Prosessert'},{n:'Gul l\u00f8k, grillet',w:'40g',c:'1',note:'Karamellisert'},{n:'Cornichons / pickles',w:'20g',c:'1',note:''},{n:'The Smash Sauce',w:'20g',c:'1.5',note:''}],
      al:['Gluten','Egg','Melk','Sennep','Sulfitt'], tips:'Dobbel er standard. Kunden velger aktivt liten.' },
    { id:'spicy', name:'The Spicy', pris_dobbel:'159', pris_enkel:'119', isNew:false,
      ings:[{n:'Kj\u00f8ttdeig 80/20 (dobbel)',w:'2 \u00d7 80g',c:'18',note:''},{n:'Brioche bun',w:'85g',c:'6',note:''},{n:'American cheddar',w:'2 \u00d7 18g',c:'6',note:''},{n:'Gul l\u00f8k, grillet',w:'40g',c:'1',note:''},{n:'Syltet jalape\u00f1o',w:'25g',c:'1.5',note:''},{n:'Franks RedHot sauce',w:'8g',c:'0.5',note:'Drypp p\u00e5 patty'},{n:'The Smash Sauce',w:'20g',c:'1.5',note:''}],
      al:['Gluten','Egg','Melk','Sennep','Sulfitt'], tips:'Franks RedHot p\u00e5 patty rett etter smashing.' },
    { id:'bbq', name:'BBQ Bacon', pris_dobbel:'169', pris_enkel:'129', isNew:false,
      ings:[{n:'Kj\u00f8ttdeig 80/20 (dobbel)',w:'2 \u00d7 80g',c:'18',note:''},{n:'Brioche bun',w:'85g',c:'6',note:''},{n:'American cheddar',w:'2 \u00d7 18g',c:'6',note:''},{n:'R\u00f8kt bacon',w:'3 \u00d7 15g',c:'6',note:'Spr\u00f8stek'},{n:'Fritert l\u00f8kring',w:'2 stk',c:'2',note:''},{n:'Hickory BBQ-saus',w:'15g',c:'1',note:'Bulls Eye'},{n:'Majones',w:'10g',c:'0.5',note:'Hellmanns'}],
      al:['Gluten','Egg','Melk','Sennep','Sulfitt'], tips:'' },
    { id:'chicken', name:'Chicken Smash', pris_dobbel:'139', pris_enkel:'109', isNew:false,
      ings:[{n:'Kyllingfilet, tynne skiver',w:'150g',c:'18',note:'Bankes flat'},{n:'Brioche bun',w:'85g',c:'6',note:''},{n:'American cheddar',w:'1 \u00d7 18g',c:'3',note:''},{n:'Coleslaw (hjemmelaget)',w:'40g',c:'2',note:''},{n:'Cornichons / pickles',w:'20g',c:'1',note:''},{n:'The Smash Sauce',w:'20g',c:'1.5',note:''}],
      al:['Gluten','Egg','Melk','Sennep','Sulfitt'], tips:'Kylling til 75\u00b0C. Aldri bland med biff p\u00e5 platen.' },
    { id:'kids', name:'Kids', pris_dobbel:'79', pris_enkel:'', isNew:false,
      ings:[{n:'Kj\u00f8ttdeig 80/20 (enkel)',w:'80g',c:'9',note:''},{n:'Brioche bun (liten)',w:'70g',c:'5',note:''},{n:'American cheddar',w:'1 \u00d7 18g',c:'3',note:''},{n:'Ketchup',w:'15g',c:'0.3',note:'Heinz'}],
      al:['Gluten','Melk','Sulfitt'], tips:'' },
  ],
  sider: [
    {name:'Plain fries stor',pris:'65'},{name:'Plain fries liten',pris:'45'},
    {name:'Loaded fries',pris:'89'},{name:'Brus 0,33L',pris:'30'},
    {name:'Vann 0,5L',pris:'20'},{name:'The Smash-kombo',pris:'210'},
  ],
  sauser: [
    { name:'The Smash Sauce', desc:'Signatursaus \u2014 brukes p\u00e5 alle burgere',
      ings:[{n:'Hellmanns majones',a:'200g',note:'Base'},{n:'Dijon-sennep',a:'20g',note:''},{n:'Ketchup (Heinz)',a:'20g',note:''},{n:'Sylteagurk-lake',a:'15ml',note:'Fra cornichons-glasset'},{n:'Worcestershire sauce',a:'8ml',note:'Umami-dybde'},{n:'Hvitl\u00f8kpulver',a:'3g',note:''},{n:'L\u00f8kpulver',a:'3g',note:''},{n:'R\u00f8kt paprika',a:'4g',note:''},{n:'Sukker',a:'5g',note:'Balanserer syre'},{n:'Hvit pepper',a:'1g',note:''}],
      steps:['Bland alle ingredienser med slikkepott \u2014 ikke visp.','Smak til med salt og ekstra sylteagurk-lake.','Kj\u00f8l ned minst 2 timer f\u00f8r bruk.','Kast etter 24 timer i vognen.'] },
    { name:'The Smash Hot Sauce', desc:'Varm variant \u2014 The Spicy og som ekstra tilbeh\u00f8r',
      ings:[{n:'Hellmanns majones',a:'200g',note:'Base'},{n:'Franks RedHot',a:'40ml',note:''},{n:'Syltet jalape\u00f1o-lake',a:'20ml',note:''},{n:'Hvitl\u00f8kpulver',a:'4g',note:''},{n:'R\u00f8kt paprika',a:'4g',note:''},{n:'Lime juice (fersk)',a:'10ml',note:'Balanserer varmen'},{n:'Honning',a:'8g',note:'Balanserer styrke'},{n:'Hvit pepper',a:'1g',note:''}],
      steps:['Bland majones og Franks RedHot til jevn farge.','Tilsett jalape\u00f1o-lake og lime.','R\u00f8r inn t\u00f8rre krydder og honning.','Smak til.','Kj\u00f8l ned 2 timer. Kast etter 24t.'] },
  ]
};

const DEFAULT_LIB = [
  {n:'Kj\u00f8ttdeig 80/20 (dobbel)',w:'2 \u00d7 80g',c:'18',note:'Chuck/brisket, fersk'},
  {n:'Kj\u00f8ttdeig 80/20 (enkel)',w:'80g',c:'9',note:'Chuck/brisket, fersk'},
  {n:'Kyllingfilet, tynne skiver',w:'150g',c:'18',note:'Bankes flat'},
  {n:'Brioche bun',w:'85g',c:'6',note:'Lett grilles'},
  {n:'Brioche bun (liten)',w:'70g',c:'5',note:''},
  {n:'American cheddar',w:'2 \u00d7 18g',c:'6',note:'Prosessert'},
  {n:'Gul l\u00f8k, grillet',w:'40g',c:'1',note:'Karamellisert'},
  {n:'Cornichons / pickles',w:'20g',c:'1',note:''},
  {n:'The Smash Sauce',w:'20g',c:'1.5',note:''},
  {n:'Syltet jalape\u00f1o',w:'25g',c:'1.5',note:'Fra glass'},
  {n:'Franks RedHot sauce',w:'8g',c:'0.5',note:''},
  {n:'R\u00f8kt bacon',w:'3 \u00d7 15g',c:'6',note:'Spr\u00f8stek'},
  {n:'Fritert l\u00f8kring',w:'2 stk',c:'2',note:''},
  {n:'Hickory BBQ-saus',w:'15g',c:'1',note:'Bulls Eye'},
  {n:'Majones',w:'10g',c:'0.5',note:'Hellmanns'},
  {n:'Coleslaw (hjemmelaget)',w:'40g',c:'2',note:''},
  {n:'Ketchup',w:'15g',c:'0.3',note:'Heinz'},
];

let S = JSON.parse(JSON.stringify(DEFAULT));
let LIB = [...DEFAULT_LIB.map(x => ({...x}))];
let tab = 'b0';
let sausIdx = 0;
let picker = null;
let saveTimer = null;

// —— STORAGE ————————————————————————————————————————————

function save() {
  try { localStorage.setItem(SK, JSON.stringify(S)); localStorage.setItem(LK, JSON.stringify(LIB)); }
  catch(e) {}
  setSaveBadge('Lagret \u2713', true);
}

function scheduleSave() {
  setSaveBadge('Lagrer...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 800);
}

function load() {
  try { const m = localStorage.getItem(SK); if (m) S = JSON.parse(m); } catch(e) {}
  try { const l = localStorage.getItem(LK); if (l) LIB = JSON.parse(l); } catch(e) {}
  setSaveBadge('Innlastet \u2713', true);
  render();
}

function setSaveBadge(msg, ok=false) {
  const el = document.getElementById('save-badge');
  if (el) { el.textContent = msg; el.className = 'save-badge' + (ok ? ' saved' : ''); }
}

// —— TOAST ——————————————————————————————————————————————

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// —— HELPERS ————————————————————————————————————————————

function cost(ings) { return ings.reduce((a, i) => a + parseFloat(i.c || '0'), 0); }
function fmt(n) { return Math.round(n * 10) / 10; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function saveToLib(ing) {
  const ex = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
  if (ex) { Object.assign(ex, ing); toast('Oppdatert i bibliotek'); }
  else { LIB.push({...ing}); toast('Lagret: ' + ing.n); }
  scheduleSave();
}

function addFromLib(bi, item) {
  S.burgers[bi].ings.push({n:item.n, w:item.w, c:item.c, note:item.note||''});
  const dd = document.getElementById('dd-' + bi);
  const inp = document.getElementById('pi-' + bi);
  if (dd) dd.style.display = 'none';
  if (inp) inp.value = '';
  picker = null;
  scheduleSave(); render();
}

function showPicker(bi, q) {
  const dd = document.getElementById('dd-' + bi);
  if (!dd) return;
  const res = q ? LIB.filter(l => l.n.toLowerCase().includes(q.toLowerCase())) : LIB.slice(0, 12);
  if (!res.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = res.map((l, idx) =>
    `<div class="picker-item" onmousedown="addFromLib(${bi}, LIB[${LIB.indexOf(l)}])">
      ${esc(l.n)}<span class="pi-meta">${esc(l.w)} \u00b7 ${esc(l.c)} kr</span></div>`
  ).join('');
  dd.style.display = 'block'; picker = bi;
}

document.addEventListener('click', e => {
  if (picker !== null) {
    const wrap = document.getElementById('pw-' + picker);
    if (wrap && !wrap.contains(e.target)) {
      const dd = document.getElementById('dd-' + picker);
      if (dd) dd.style.display = 'none';
      picker = null;
    }
  }
});

// —— RENDER —————————————————————————————————————————————

function renderTabs() {
  const tabs = [
    ...S.burgers.map((b, i) => `<button class="tab${tab==='b'+i?' on':''}" onclick="tab='b${i}';render()">${esc(b.name)}${b.isNew?'<span class="new-badge">NY</span>':''}</button>`),
    `<button class="tab${tab==='sider'?' on':''}" onclick="tab='sider';render()">Tilbeh\u00f8r & drikke</button>`,
    `<button class="tab${tab==='sauser'?' saus-on':''}" onclick="tab='sauser';render()">Sauser</button>`,
    `<button class="tab${tab==='lib'?' lib-on':''}" onclick="tab='lib';render()">Bibliotek</button>`,
    `<button class="tab-add" onclick="addBurger()">+ Ny burger</button>`,
  ];
  document.getElementById('main-tabs').innerHTML = tabs.join('');
}

function render() {
  renderTabs();
  const pane = document.getElementById('main-pane');
  if (tab.startsWith('b')) {
    const i = parseInt(tab.slice(1));
    if (i < S.burgers.length) pane.innerHTML = renderBurger(i);
    else { tab = 'b0'; render(); return; }
  } else if (tab === 'sider') {
    pane.innerHTML = renderSider();
  } else if (tab === 'sauser') {
    pane.innerHTML = renderSauser();
  } else if (tab === 'lib') {
    pane.innerHTML = renderLibrary();
  }
}

// —— BURGER —————————————————————————————————————————————

function renderBurger(i) {
  const b = S.burgers[i];
  const c = cost(b.ings);
  const pris = parseFloat(b.pris_dobbel) || 0;
  const margin = pris > 0 ? ((pris - c) / pris * 100) : 0;
  const marginColor = margin >= 75 ? 'var(--success)' : margin >= 60 ? 'var(--warn)' : 'var(--danger)';

  let html = `<div class="card">`;

  // Navn & priser
  html += `<div class="sec">Produkt</div>`;
  html += `<div class="field-row">
    <span class="field-label">Navn</span>
    <input value="${esc(b.name)}" oninput="S.burgers[${i}].name=this.value;scheduleSave();renderTabs()">
  </div>`;

  html += `<div class="price-row">
    <div class="price-block">
      <span class="price-label">Dobbel (standard)</span>
      <input type="number" value="${esc(b.pris_dobbel)}" oninput="S.burgers[${i}].pris_dobbel=this.value;scheduleSave();render()">
    </div>
    <div class="price-block">
      <span class="price-label">Liten</span>
      <input type="number" value="${esc(b.pris_enkel)}" placeholder="\u2014" oninput="S.burgers[${i}].pris_enkel=this.value;scheduleSave();render()">
    </div>
  </div>`;

  // Tips
  html += `<div class="field-row">
    <span class="field-label">Driftstips</span>
    <input value="${esc(b.tips||'')}" placeholder="Valgfritt..." oninput="S.burgers[${i}].tips=this.value;scheduleSave()">
  </div>`;

  // Ingredienser
  html += `<div class="sec">Ingredienser</div>`;
  html += `<div class="ing-header">
    <span class="col-head">Ingrediens</span>
    <span class="col-head">Mengde</span>
    <span class="col-head">Kost (kr)</span>
    <span class="col-head">Merknad</span>
    <span></span>
  </div>`;

  b.ings.forEach((ing, j) => {
    html += `<div class="ing-row">
      <input value="${esc(ing.n)}" oninput="S.burgers[${i}].ings[${j}].n=this.value;scheduleSave()">
      <input value="${esc(ing.w)}" oninput="S.burgers[${i}].ings[${j}].w=this.value;scheduleSave()">
      <input type="number" step="0.1" value="${esc(ing.c)}" oninput="S.burgers[${i}].ings[${j}].c=this.value;scheduleSave();render()">
      <input value="${esc(ing.note)}" placeholder="" oninput="S.burgers[${i}].ings[${j}].note=this.value;scheduleSave()">
      <div class="btn-pair">
        <button class="icon-btn save" onclick="saveToLib(S.burgers[${i}].ings[${j}])" title="Lagre til bibliotek">\u2191</button>
        <button class="icon-btn del" onclick="S.burgers[${i}].ings.splice(${j},1);scheduleSave();render()" title="Fjern">\u00d7</button>
      </div>
    </div>`;
  });

  // Legg til ingrediens
  html += `<button class="add-row" onclick="S.burgers[${i}].ings.push({n:'',w:'',c:'0',note:''});scheduleSave();render()">+ Legg til ingrediens manuelt</button>`;

  // Picker fra bibliotek
  html += `<div class="picker-wrap" id="pw-${i}">
    <input id="pi-${i}" placeholder="S\u00f8k i bibliotek..." onfocus="showPicker(${i},this.value)" oninput="showPicker(${i},this.value)">
    <div class="picker-dd" id="dd-${i}" style="display:none"></div>
  </div>`;

  // Margin bar
  html += `<div class="margin-bar">
    <div><div class="mb-label">R\u00e5varekost</div><div class="mb-val">${fmt(c)} kr</div></div>
    <div><div class="mb-label">Pris (dobbel)</div><div class="mb-val">${pris} kr</div></div>
    <div><div class="mb-label">Bruttomargin</div><div class="mb-val" style="color:${marginColor}">${fmt(margin)}%</div></div>
  </div>`;

  // Allergener
  html += `<div class="sec">Allergener</div>`;
  html += ALLERGENS.map(a =>
    `<span class="al-tag${b.al && b.al.includes(a)?' on':''}" onclick="toggleAllergen(${i},'${a}')">${a}</span>`
  ).join('');

  // Slett burger
  if (b.isNew) {
    html += `<div style="margin-top:20px;text-align:right">
      <button class="tab-del" onclick="deleteBurger(${i})">Slett denne burgeren</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function toggleAllergen(bi, allergen) {
  const b = S.burgers[bi];
  if (!b.al) b.al = [];
  const idx = b.al.indexOf(allergen);
  if (idx >= 0) b.al.splice(idx, 1);
  else b.al.push(allergen);
  scheduleSave();
  render();
}

function addBurger() {
  const id = 'custom_' + Date.now();
  S.burgers.push({
    id, name:'Ny burger', pris_dobbel:'', pris_enkel:'', isNew:true,
    ings:[], al:[], tips:''
  });
  tab = 'b' + (S.burgers.length - 1);
  scheduleSave();
  render();
  toast('Ny burger opprettet');
}

function deleteBurger(i) {
  if (!confirm('Slett "' + S.burgers[i].name + '"?')) return;
  S.burgers.splice(i, 1);
  tab = 'b0';
  scheduleSave();
  render();
  toast('Burger slettet');
}

// —— SIDER / TILBEH\u00d8R ———————————————————————————————————

function renderSider() {
  let html = `<div class="card">`;
  html += `<div class="sec">Tilbeh\u00f8r og drikke</div>`;

  S.sider.forEach((s, i) => {
    html += `<div class="side-row">
      <input value="${esc(s.name)}" style="flex:2" oninput="S.sider[${i}].name=this.value;scheduleSave()">
      <input type="number" value="${esc(s.pris)}" style="flex:0.5;text-align:right" oninput="S.sider[${i}].pris=this.value;scheduleSave()">
      <span style="font-size:12px;color:var(--muted);flex-shrink:0">kr</span>
      <button class="icon-btn del" onclick="S.sider.splice(${i},1);scheduleSave();render()" title="Fjern">\u00d7</button>
    </div>`;
  });

  html += `<button class="add-row" onclick="S.sider.push({name:'',pris:''});scheduleSave();render()">+ Legg til produkt</button>`;
  html += `</div>`;
  return html;
}

// —— SAUSER —————————————————————————————————————————————

function renderSauser() {
  if (sausIdx >= S.sauser.length) sausIdx = 0;
  const s = S.sauser[sausIdx];

  let html = `<div class="card">`;

  // Saus-tabs
  html += `<div class="saus-tab-row">`;
  S.sauser.forEach((sa, i) => {
    html += `<button class="saus-tab${sausIdx===i?' on':''}" onclick="sausIdx=${i};render()">${esc(sa.name)}</button>`;
  });
  html += `<button class="tab-add" onclick="addSaus()">+ Ny saus</button>`;
  html += `</div>`;

  // Saus detaljer
  html += `<div class="field-row">
    <span class="field-label">Navn</span>
    <input value="${esc(s.name)}" oninput="S.sauser[${sausIdx}].name=this.value;scheduleSave();render()">
  </div>`;
  html += `<div class="field-row">
    <span class="field-label">Beskrivelse</span>
    <input value="${esc(s.desc)}" oninput="S.sauser[${sausIdx}].desc=this.value;scheduleSave()">
  </div>`;

  // Ingredienser
  html += `<div class="sec">Ingredienser (batch ~270g)</div>`;
  html += `<div class="ing-header">
    <span class="col-head">Ingrediens</span>
    <span class="col-head">Mengde</span>
    <span class="col-head"></span>
    <span class="col-head">Merknad</span>
    <span></span>
  </div>`;

  s.ings.forEach((ing, j) => {
    html += `<div class="ing-row">
      <input value="${esc(ing.n)}" oninput="S.sauser[${sausIdx}].ings[${j}].n=this.value;scheduleSave()">
      <input value="${esc(ing.a)}" oninput="S.sauser[${sausIdx}].ings[${j}].a=this.value;scheduleSave()">
      <input disabled style="background:transparent;border-color:transparent">
      <input value="${esc(ing.note)}" placeholder="" oninput="S.sauser[${sausIdx}].ings[${j}].note=this.value;scheduleSave()">
      <div class="btn-pair">
        <button class="icon-btn del" onclick="S.sauser[${sausIdx}].ings.splice(${j},1);scheduleSave();render()">\u00d7</button>
      </div>
    </div>`;
  });

  html += `<button class="add-row" onclick="S.sauser[${sausIdx}].ings.push({n:'',a:'',note:''});scheduleSave();render()">+ Legg til ingrediens</button>`;

  // Fremgangsm\u00e5te
  html += `<div class="sec">Fremgangsm\u00e5te</div>`;
  s.steps.forEach((step, j) => {
    html += `<div class="step-row">
      <div class="step-num">${j+1}</div>
      <input value="${esc(step)}" oninput="S.sauser[${sausIdx}].steps[${j}]=this.value;scheduleSave()">
      <button class="icon-btn del" onclick="S.sauser[${sausIdx}].steps.splice(${j},1);scheduleSave();render()">\u00d7</button>
    </div>`;
  });
  html += `<button class="add-row" onclick="S.sauser[${sausIdx}].steps.push('');scheduleSave();render()">+ Legg til steg</button>`;

  // Slett saus
  if (S.sauser.length > 1) {
    html += `<div style="margin-top:20px;text-align:right">
      <button class="tab-del" onclick="deleteSaus(${sausIdx})">Slett denne sausen</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function addSaus() {
  S.sauser.push({ name:'Ny saus', desc:'', ings:[], steps:[] });
  sausIdx = S.sauser.length - 1;
  scheduleSave();
  render();
  toast('Ny saus opprettet');
}

function deleteSaus(i) {
  if (!confirm('Slett "' + S.sauser[i].name + '"?')) return;
  S.sauser.splice(i, 1);
  sausIdx = 0;
  scheduleSave();
  render();
  toast('Saus slettet');
}

// —— BIBLIOTEK ——————————————————————————————————————————

function renderLibrary() {
  let html = `<div class="card">`;
  html += `<div class="sec">Ingrediensbibliotek</div>`;
  html += `<div class="lib-note">Ingredienser du lagrer her kan gjenbrukes p\u00e5 tvers av alle burgere via s\u00f8kefeltet. Klikk \u2191-pilen p\u00e5 en ingrediens for \u00e5 lagre den hit.</div>`;

  html += `<div style="margin-top:14px">`;
  html += `<div class="ing-header" style="grid-template-columns:2fr 1fr 1fr 1.5fr 28px">
    <span class="col-head">Ingrediens</span>
    <span class="col-head">Mengde</span>
    <span class="col-head">Kost (kr)</span>
    <span class="col-head">Merknad</span>
    <span></span>
  </div>`;

  LIB.forEach((l, i) => {
    html += `<div class="lib-row">
      <input value="${esc(l.n)}" oninput="LIB[${i}].n=this.value;scheduleSave()">
      <input value="${esc(l.w)}" oninput="LIB[${i}].w=this.value;scheduleSave()">
      <input type="number" step="0.1" value="${esc(l.c)}" oninput="LIB[${i}].c=this.value;scheduleSave()">
      <input value="${esc(l.note)}" oninput="LIB[${i}].note=this.value;scheduleSave()">
      <button class="icon-btn del" onclick="LIB.splice(${i},1);scheduleSave();render()" title="Fjern">\u00d7</button>
    </div>`;
  });
  html += `</div>`;

  html += `<button class="add-row" onclick="LIB.push({n:'',w:'',c:'0',note:''});scheduleSave();render()">+ Legg til ingrediens</button>`;

  html += `</div>`;
  return html;
}

// —— EXPORT DOCX ———————————————————————————————————————

async function exportDocx() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Genererer...';

  try {
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle, HeadingLevel } = docx;

    const noBorder = { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
    const noBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };

    const sections = [];

    // Title
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'THE SMASH', bold: true, size: 48, font: 'Arial' })],
      alignment: AlignmentType.CENTER,
      spacing: { after: 100 },
    }));
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Menyspesifikasjon', size: 24, color: '888888', font: 'Arial' })],
      alignment: AlignmentType.CENTER,
      spacing: { after: 400 },
    }));

    // Burgere
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Burgere', bold: true, size: 32, font: 'Arial' })],
      spacing: { before: 300, after: 200 },
    }));

    for (const b of S.burgers) {
      const c = cost(b.ings);
      const pris = parseFloat(b.pris_dobbel) || 0;
      const margin = pris > 0 ? Math.round((pris - c) / pris * 100) : 0;

      sections.push(new Paragraph({
        children: [new TextRun({ text: b.name, bold: true, size: 26, font: 'Arial' })],
        spacing: { before: 200, after: 60 },
      }));

      const prisText = b.pris_enkel
        ? `Pris: ${b.pris_dobbel} / ${b.pris_enkel} kr  \u00b7  R\u00e5varekost: ~${fmt(c)} kr  \u00b7  Bruttomargin: ${margin}%`
        : `Pris: ${b.pris_dobbel} kr  \u00b7  R\u00e5varekost: ~${fmt(c)} kr  \u00b7  Bruttomargin: ${margin}%`;

      sections.push(new Paragraph({
        children: [new TextRun({ text: prisText, size: 20, color: '666666', font: 'Arial' })],
        spacing: { after: 100 },
      }));

      // Ingredient table
      const headerRow = new TableRow({
        children: ['Ingrediens', 'Mengde', 'Kostnad', 'Merknad'].map(h =>
          new TableCell({
            children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18, font: 'Arial' })] })],
            borders: noBorders,
          })
        ),
      });

      const ingRows = b.ings.map(ing => new TableRow({
        children: [ing.n, ing.w, ing.c + ' kr', ing.note || ''].map(t =>
          new TableCell({
            children: [new Paragraph({ children: [new TextRun({ text: t, size: 18, font: 'Arial' })] })],
            borders: noBorders,
          })
        ),
      }));

      sections.push(new Table({
        rows: [headerRow, ...ingRows],
        width: { size: 100, type: WidthType.PERCENTAGE },
      }));

      if (b.al && b.al.length > 0) {
        sections.push(new Paragraph({
          children: [new TextRun({ text: 'Allergener: ' + b.al.join(', '), size: 18, italics: true, color: '999999', font: 'Arial' })],
          spacing: { before: 60, after: 60 },
        }));
      }

      if (b.tips) {
        sections.push(new Paragraph({
          children: [new TextRun({ text: '\u26d1 ' + b.tips, size: 18, color: '7a5a00', font: 'Arial' })],
          spacing: { after: 100 },
        }));
      }
    }

    // Tilbeh\u00f8r
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Tilbeh\u00f8r og drikke', bold: true, size: 32, font: 'Arial' })],
      spacing: { before: 400, after: 200 },
    }));

    const sideHeaderRow = new TableRow({
      children: ['Navn', 'Pris'].map(h =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    });

    const sideRows = S.sider.map(s => new TableRow({
      children: [s.name, s.pris + ' kr'].map(t =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: t, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    }));

    sections.push(new Table({
      rows: [sideHeaderRow, ...sideRows],
      width: { size: 100, type: WidthType.PERCENTAGE },
    }));

    // Sauser
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Sausoppskrifter', bold: true, size: 32, font: 'Arial' })],
      spacing: { before: 400, after: 200 },
    }));

    for (const sa of S.sauser) {
      sections.push(new Paragraph({
        children: [new TextRun({ text: sa.name, bold: true, size: 26, font: 'Arial' })],
        spacing: { before: 200, after: 40 },
      }));
      sections.push(new Paragraph({
        children: [new TextRun({ text: sa.desc, size: 20, color: '888888', font: 'Arial' })],
        spacing: { after: 100 },
      }));

      const sausHeaderRow = new TableRow({
        children: ['Ingrediens', 'Mengde', 'Merknad'].map(h =>
          new TableCell({
            children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18, font: 'Arial' })] })],
            borders: noBorders,
          })
        ),
      });

      const sausIngRows = sa.ings.map(ing => new TableRow({
        children: [ing.n, ing.a, ing.note || ''].map(t =>
          new TableCell({
            children: [new Paragraph({ children: [new TextRun({ text: t, size: 18, font: 'Arial' })] })],
            borders: noBorders,
          })
        ),
      }));

      sections.push(new Table({
        rows: [sausHeaderRow, ...sausIngRows],
        width: { size: 100, type: WidthType.PERCENTAGE },
      }));

      if (sa.steps.length > 0) {
        sections.push(new Paragraph({
          children: [new TextRun({ text: 'Fremgangsm\u00e5te', bold: true, size: 20, font: 'Arial' })],
          spacing: { before: 120, after: 60 },
        }));
        sa.steps.forEach((step, j) => {
          sections.push(new Paragraph({
            children: [new TextRun({ text: `${j+1}. ${step}`, size: 18, font: 'Arial' })],
            spacing: { after: 30 },
          }));
        });
      }
    }

    // Allergen overview
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Allergenoversikt', bold: true, size: 32, font: 'Arial' })],
      spacing: { before: 400, after: 200 },
    }));

    const alHeaderRow = new TableRow({
      children: ['Produkt', ...ALLERGENS].map(h =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 16, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    });

    const alRows = S.burgers.map(b => new TableRow({
      children: [
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: b.name, size: 16, font: 'Arial' })] })],
          borders: noBorders,
        }),
        ...ALLERGENS.map(a =>
          new TableCell({
            children: [new Paragraph({ children: [new TextRun({ text: b.al && b.al.includes(a) ? '!' : '\u2013', size: 16, font: 'Arial', color: b.al && b.al.includes(a) ? 'CC0000' : '999999' })] })],
            borders: noBorders,
          })
        ),
      ],
    }));

    sections.push(new Table({
      rows: [alHeaderRow, ...alRows],
      width: { size: 100, type: WidthType.PERCENTAGE },
    }));

    const doc = new Document({
      sections: [{ children: sections }],
    });

    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'THE_SMASH_Menyspesifikasjon.docx';
    a.click();
    URL.revokeObjectURL(url);
    toast('Dokument lastet ned');
  } catch (err) {
    console.error(err);
    toast('Feil ved eksport: ' + err.message);
  }

  btn.disabled = false;
  btn.textContent = 'Last ned Word-dokument';
}

// —— INIT ———————————————————————————————————————————————

load();
</script>
