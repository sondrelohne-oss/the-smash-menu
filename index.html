let showOrder = false;
const UNITS = ['stk','kg','g','L','dl','pakke','pose','boks','glass'];

function getLowStockCount() {
  return LIB.filter(l => l.minStock > 0 && l.stock <= l.minStock).length;
}

function getStockStatus(l) {
  if (l.stock <= 0) return 'empty';
  if (l.minStock > 0 && l.stock <= l.minStock) return 'low';
  return 'ok';
}

function calcBurgersFromStock(l) {
  let minBurgers = Infinity;
  let usedBy = [];
  for (const b of S.burgers) {
    if (b.status === 'forkastet') continue;
    const match = (b.ings || []).find(ing => ing.n.toLowerCase() === l.n.toLowerCase());
    if (match) {
      const perBurger = parseAmount(match.w);
      if (perBurger > 0) {
        let stockVal = l.stock;
        const w = String(match.w).toLowerCase();
        // Convert stock unit to match ingredient unit
        if (l.unit === 'kg' && (w.includes('g') && !w.includes('kg'))) stockVal *= 1000;
        else if (l.unit === 'L' && w.includes('ml')) stockVal *= 1000;
        else if (l.unit === 'stk') {
          // If stock is "stk" but ingredient weight has grams, use stock as-is
          // (e.g. 48 stk buns, 1 per burger = 48 burgers)
          if (w.includes('g') || w.includes('ml')) { stockVal = l.stock; /* can't convert, skip */ minBurgers = minBurgers; usedBy.push(b.name); continue; }
        }
        const count = Math.floor(stockVal / perBurger);
        minBurgers = Math.min(minBurgers, count);
        usedBy.push(b.name);
      } else {
        // No parseable amount but ingredient is used — count by stock as "1 per burger"
        const count = Math.floor(l.stock);
        minBurgers = Math.min(minBurgers, count);
        usedBy.push(b.name);
      }
    }
  }
  if (usedBy.length === 0) return null;
  if (minBurgers === Infinity) minBurgers = Math.floor(l.stock);
  return { count: minBurgers, burgers: usedBy };
}

const OPPBEVARING = ['kjoeleskap','frys','romtemp'];
const OPPBEVARING_LABEL = {kjoeleskap:'Kj\u00f8leskap', frys:'Frys', romtemp:'Romtemperatur', '':'Ikke satt'};
const OPPBEVARING_ICON = {kjoeleskap:'\u2744\ufe0f', frys:'\ud83e\uddca', romtemp:'\ud83c\udf21\ufe0f', '':''};

function renderLager() {
  const all = LIB.map((l,i) => ({...l, _i:i}));

  // Group by oppbevaring
  const groups = {};
  const groupOrder = ['kjoeleskap','frys','romtemp',''];
  for (const g of groupOrder) groups[g] = [];
  for (const item of all) {
    const key = item.oppbevaring || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  }
  // Sort within each group: empty → low → ok
  const statusOrder = {empty:0, low:1, ok:2};
  for (const key in groups) {
    groups[key].sort((a,b) => statusOrder[getStockStatus(a)] - statusOrder[getStockStatus(b)]);
  }

  let html = `<div class="card">`;
  html += `<div class="sec">Varebeholdning</div>`;
  html += `<div class="lib-note">Oppdater beholdning med +/\u2212 knappene etter service. Sett minimumsniv\u00e5 for \u00e5 f\u00e5 varsel n\u00e5r du m\u00e5 bestille.</div>`;

  for (const gKey of groupOrder) {
    const items = groups[gKey];
    if (items.length === 0) continue;

    const label = OPPBEVARING_LABEL[gKey] || 'Annet';
    const icon = OPPBEVARING_ICON[gKey] || '';

    html += `<div style="margin-top:16px;font-size:13px;font-weight:700;color:var(--text);padding:6px 0;border-bottom:2px solid var(--gold)">${icon} ${label} <span style="font-weight:400;color:var(--muted);font-size:11px">(${items.length})</span></div>`;

    // Header
    html += `<div class="lager-row" style="padding-bottom:2px;margin-top:4px">
      <span class="col-head">Ingrediens</span>
      <span class="col-head">Beholdning</span>
      <span class="col-head">Enhet</span>
      <span class="col-head">Min.niv\u00e5</span>
      <span class="col-head">Leverand\u00f8r</span>
      <span class="col-head">Best.mengde</span>
      <span class="col-head">Burgere</span>
      <span class="col-head">Status</span>
    </div>`;

    for (const item of items) {
      const i = item._i;
      const l = LIB[i];
      const st = getStockStatus(l);
      const stLabel = st === 'empty' ? 'Tomt' : st === 'low' ? 'Lavt' : 'OK';
      const stClass = 'stock-status stock-' + st;

      html += `<div class="lager-row">
        <div>
          <div style="font-size:13px;font-weight:600">${esc(l.n)}</div>
          <select style="font-size:10px;padding:1px 4px;border:none;background:transparent;color:var(--muted);width:auto;margin-top:2px" onchange="LIB[${i}].oppbevaring=this.value;scheduleSave();render()">
            <option value=""${!l.oppbevaring?' selected':''}>Velg oppbevaring...</option>
            <option value="kjoeleskap"${l.oppbevaring==='kjoeleskap'?' selected':''}>Kj\u00f8leskap</option>
            <option value="frys"${l.oppbevaring==='frys'?' selected':''}>Frys</option>
            <option value="romtemp"${l.oppbevaring==='romtemp'?' selected':''}>Romtemperatur</option>
          </select>
        </div>
        <div class="stock-adj">
          <button onclick="adjStock(${i},-1)">\u2212</button>
          <input type="number" value="${l.stock}" style="width:50px;text-align:center" oninput="LIB[${i}].stock=parseFloat(this.value)||0;scheduleSave()" onblur="render()">
          <button onclick="adjStock(${i},1)">+</button>
        </div>
        <select style="width:auto" onchange="LIB[${i}].unit=this.value;scheduleSave()">
          ${UNITS.map(u => `<option value="${u}"${l.unit===u?' selected':''}>${u}</option>`).join('')}
        </select>
        <input type="number" value="${l.minStock}" style="width:60px;text-align:center" oninput="LIB[${i}].minStock=parseFloat(this.value)||0;scheduleSave()" onblur="render()">
        <input value="${esc(l.supplier||'')}" placeholder="Leverand\u00f8r..." oninput="LIB[${i}].supplier=this.value;scheduleSave()">
        <input type="number" value="${l.orderQty}" style="width:60px;text-align:center" oninput="LIB[${i}].orderQty=parseFloat(this.value)||0;scheduleSave()" onblur="render()">`;

      const burgerCalc = calcBurgersFromStock(l);
      if (burgerCalc) {
        const color = burgerCalc.count <= 5 ? 'var(--danger)' : burgerCalc.count <= 15 ? 'var(--warn)' : 'var(--success)';
        html += `<span style="font-size:14px;font-weight:700;color:${color};text-align:center" title="${esc(burgerCalc.burgers.join(', '))}">${burgerCalc.count}</span>`;
      } else {
        html += `<span style="font-size:11px;color:var(--muted);text-align:center">\u2014</span>`;
      }

      html += `<span class="${stClass}">${stLabel}</span>
      </div>`;
    }
  }

  // Summary
  const lowCount = getLowStockCount();
  const emptyCount = LIB.filter(l => l.stock <= 0 && l.minStock > 0).length;
  html += `<div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <span style="font-size:12px;color:var(--muted)">${LIB.length} ingredienser \u00b7 ${lowCount} lave \u00b7 ${emptyCount} tomme</span>
    <button class="add-row" style="width:auto;padding:7px 16px;${lowCount>0?'background:var(--warn-bg);border-color:var(--warn);color:var(--warn);font-weight:600':''}" onclick="showOrder=!showOrder;render()">
      ${showOrder ? 'Skjul bestilling' : 'Generer bestilling'} (${lowCount})
    </button>
  </div>`;

  if (showOrder) {
    html += renderBestilling();
  }

  html += `</div>`;
  return html;
}

function adjStock(i, delta) {
  LIB[i].stock = Math.max(0, (LIB[i].stock || 0) + delta);
  scheduleSave();
  render();
}

function renderBestilling() {
  const needOrder = LIB.filter(l => l.minStock > 0 && l.stock <= l.minStock);
  if (needOrder.length === 0) {
    return `<div class="order-section"><p style="color:var(--muted);font-size:13px">Alt p\u00e5 lager er over minimumsniv\u00e5. Ingen bestilling n\u00f8dvendig.</p></div>`;
  }

  // Group by supplier
  const groups = {};
  for (const l of needOrder) {
    const sup = l.supplier || 'Ukjent leverand\u00f8r';
    if (!groups[sup]) groups[sup] = [];
    const qty = l.orderQty > 0 ? l.orderQty : Math.max(1, (l.minStock * 2) - l.stock);
    const estCost = qty * parseFloat(l.c || 0);
    groups[sup].push({...l, _qty: qty, _cost: estCost});
  }

  let html = `<div class="order-section">`;
  html += `<div class="sec" style="margin-top:0">Bestillingsliste</div>`;

  let grandTotal = 0;

  for (const [supplier, items] of Object.entries(groups)) {
    let groupTotal = 0;
    html += `<div class="order-group">`;
    html += `<div class="order-group-title">${esc(supplier)}</div>`;
    html += `<div class="order-row" style="font-weight:600;color:var(--muted)">
      <span>Vare</span><span>Mengde</span><span>Enhet</span><span style="text-align:right">Est. kost</span>
    </div>`;

    for (const item of items) {
      groupTotal += item._cost;
      html += `<div class="order-row">
        <span>${esc(item.n)}</span>
        <span>${item._qty}</span>
        <span>${esc(item.unit)}</span>
        <span style="text-align:right">${Math.round(item._cost)} kr</span>
      </div>`;
    }
    grandTotal += groupTotal;
    html += `<div class="order-total">${Math.round(groupTotal)} kr</div>`;
    html += `</div>`;
  }

  html += `<div style="font-size:15px;font-weight:700;text-align:right;margin-top:12px;padding-top:8px;border-top:2px solid var(--text)">Totalt: ${Math.round(grandTotal)} kr</div>`;

  html += `<div class="order-actions">
    <button class="primary" onclick="copyOrder()">Kopier til utklippstavle</button>
    <button onclick="window.print()">Skriv ut</button>
    <button onclick="markOrdered()">Marker som bestilt</button>
  </div>`;

  html += `</div>`;
  return html;
}

function copyOrder() {
  const needOrder = LIB.filter(l => l.minStock > 0 && l.stock <= l.minStock);
  const groups = {};
  for (const l of needOrder) {
    const sup = l.supplier || 'Ukjent';
    if (!groups[sup]) groups[sup] = [];
    const qty = l.orderQty > 0 ? l.orderQty : Math.max(1, (l.minStock * 2) - l.stock);
    groups[sup].push({n: l.n, qty, unit: l.unit});
  }

  let text = 'BESTILLING \u2014 THE SMASH\n' + new Date().toLocaleDateString('no-NO') + '\n\n';
  for (const [sup, items] of Object.entries(groups)) {
    text += sup.toUpperCase() + '\n';
    for (const item of items) {
      text += `  ${item.n}: ${item.qty} ${item.unit}\n`;
    }
    text += '\n';
  }

  navigator.clipboard.writeText(text).then(() => toast('Bestilling kopiert'));
}

function markOrdered() {
  if (!confirm('Oppdater beholdning til forventet niv\u00e5 etter bestilling?')) return;
  for (const l of LIB) {
    if (l.minStock > 0 && l.stock <= l.minStock) {
      const qty = l.orderQty > 0 ? l.orderQty : Math.max(1, (l.minStock * 2) - l.stock);
      l.stock += qty;
    }
  }
  scheduleSave();
  render();
  toast('Beholdning oppdatert');
}

function parseAmount(str) {
  if (!str) return 0;
  const s = String(str);
  // Handle "2 × 80g" or "2 x 80g" → 160
  const multiMatch = s.match(/([\d.]+)\s*[\u00d7x\*]\s*([\d.]+)/i);
  if (multiMatch) return parseFloat(multiMatch[1]) * parseFloat(multiMatch[2]);
  // Handle "80g", "200ml", "15" etc
  const match = s.match(/[\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

function makeSausBatch(sausIdx) {
  const s = S.sauser[sausIdx];
  if (!s || !s.ings || s.ings.length === 0) return;

  const missing = [];
  for (const ing of s.ings) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
    if (libMatch) {
      const need = parseAmount(ing.a);
      if (need > 0 && libMatch.stock < need) {
        missing.push(`${ing.n}: trenger ${ing.a}, har ${libMatch.stock} ${libMatch.unit}`);
      }
    }
  }

  if (missing.length > 0) {
    if (!confirm('Mangler nok av:\n\n' + missing.join('\n') + '\n\nLag batch likevel?')) return;
  }

  for (const ing of s.ings) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
    if (libMatch) {
      const need = parseAmount(ing.a);
      if (need > 0) {
        libMatch.stock = Math.max(0, libMatch.stock - need);
      }
    }
  }

  // Add to sauce stock in LIB if it exists there
  const sausInLib = LIB.find(l => l.n.toLowerCase() === s.name.toLowerCase());
  if (sausInLib) {
    sausInLib.stock = (sausInLib.stock || 0) + 1;
  }

  scheduleSave();
  render();
  toast(`Batch laget: ${s.name}`);
}

function makeBatch(i) {
  const item = LIB[i];
  if (!item.subIngs || item.subIngs.length === 0 || !item.batchSize) return;

  // Check if we have enough of each sub-ingredient
  const missing = [];
  for (const sub of item.subIngs) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === sub.n.toLowerCase() && l !== item);
    if (libMatch) {
      // Convert if same unit, otherwise just check raw numbers
      if (libMatch.stock < sub.qty) {
        missing.push(`${sub.n}: trenger ${sub.qty} ${sub.unit}, har ${libMatch.stock} ${libMatch.unit}`);
      }
    }
  }

  if (missing.length > 0) {
    if (!confirm('Mangler nok av:\n\n' + missing.join('\n') + '\n\nLag batch likevel?')) return;
  }

  // Deduct sub-ingredients from stock
  for (const sub of item.subIngs) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === sub.n.toLowerCase() && l !== item);
    if (libMatch) {
      libMatch.stock = Math.max(0, libMatch.stock - sub.qty);
    }
  }

  // Add batch result to this item's stock
  item.stock = (item.stock || 0) + item.batchSize;

  scheduleSave();
  render();
  toast(`Batch laget: +${item.batchSize} ${item.batchUnit || item.unit} ${item.n}`);
}

// ---- EXPORT: Oppskrift per vare ----

async function exportRecipe(i) {
  const item = LIB[i];
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle, AlignmentType } = docx;
  const noBorder = { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
  const noBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };

  const sections = [];

  // Title
  sections.push(new Paragraph({
    children: [new TextRun({ text: item.n, bold: true, size: 36, font: 'Arial' })],
    spacing: { after: 100 },
  }));

  if (item.note) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: item.note, size: 20, color: '888888', font: 'Arial' })],
      spacing: { after: 200 },
    }));
  }

  // Batch info
  if (item.batchSize > 0) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: `Batch gir: ${item.batchSize} ${item.batchUnit || item.unit}`, bold: true, size: 22, font: 'Arial' })],
      spacing: { after: 200 },
    }));
  }

  // Sub-ingredients table
  const subs = item.subIngs || [];
  if (subs.length > 0) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Ingredienser', bold: true, size: 26, font: 'Arial' })],
      spacing: { before: 200, after: 100 },
    }));

    const headerRow = new TableRow({
      children: ['Ingrediens', 'Mengde', 'Enhet'].map(h =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    });

    const ingRows = subs.map(sub => new TableRow({
      children: [sub.n || '', String(sub.qty || ''), sub.unit || ''].map(t =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: t, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    }));

    sections.push(new Table({
      rows: [headerRow, ...ingRows],
      width: { size: 100, type: WidthType.PERCENTAGE },
    }));
  }

  // Recipe text
  if (item.recipe && item.recipe.trim()) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Fremgangsm\u00e5te', bold: true, size: 26, font: 'Arial' })],
      spacing: { before: 300, after: 100 },
    }));

    const lines = item.recipe.split('\n');
    for (const line of lines) {
      sections.push(new Paragraph({
        children: [new TextRun({ text: line, size: 20, font: 'Arial' })],
        spacing: { after: 60 },
      }));
    }
  }

  // Footer
  sections.push(new Paragraph({
    children: [new TextRun({ text: 'THE SMASH \u2014 ' + new Date().toLocaleDateString('no-NO'), size: 16, color: 'AAAAAA', font: 'Arial' })],
    spacing: { before: 400 },
  }));

  const doc = new Document({ sections: [{ children: sections }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = item.n.replace(/[^a-zA-Z0-9\u00e6\u00f8\u00e5\u00c6\u00d8\u00c5 ]/g, '') + '_oppskrift.docx';
  a.click();
  URL.revokeObjectURL(url);
  toast('Oppskrift eksportert');
}
