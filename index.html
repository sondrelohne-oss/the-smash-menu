<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE SMASH — Menyplanlegger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --cream: #F5F0E8;
      --gold: #E8C547;
      --bg: #f9f9f7;
      --card: #ffffff;
      --border: #e0ddd8;
      --text: #1a1a1a;
      --muted: #6b6b68;
      --success: #1a7a4a;
      --success-bg: #e8f5ee;
      --warn: #7a5a00;
      --warn-bg: #fff8e0;
      --danger: #a0201a;
      --danger-bg: #fdecea;
      --info-bg: #e8f0fb;
      --info: #1a4a8a;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      background: var(--black);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(255,255,255,.08);
      overflow: visible;
    }
    .header-top {
      display: flex;
      align-items: center;
      padding: 6px 24px;
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .logo img { height: 140px; width: auto; margin: -10px 0 -55px; position: relative; z-index: 101; }
    .logo-divider { display: none; }
    .header-sub { display: none; }
    .header-nav {
      display: flex;
      gap: 2px;
      flex: 1;
      justify-content: center;
      position: relative;
    }
    .header-nav.dropdown-mode { display: none; }
    .header-nav.dropdown-mode.open { display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: var(--black); z-index: 200; padding: 8px; gap: 2px; box-shadow: 0 4px 12px rgba(0,0,0,.3); border-top: 1px solid rgba(255,255,255,.08); }
    .nav-btn {
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      white-space: nowrap;
    }
    .nav-btn:hover { color: rgba(255,255,255,0.7); }
    .nav-btn.on { color: var(--cream); border-bottom-color: var(--gold); }
    .header-nav.dropdown-mode .nav-btn { padding: 10px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.06); border-left: 2px solid transparent; }
    .header-nav.dropdown-mode .nav-btn.on { border-bottom-color: rgba(255,255,255,.06); border-left-color: var(--gold); background: rgba(255,255,255,.04); }
    .nav-btn .nav-badge { font-size: 9px; padding: 1px 5px; border-radius: 10px; background: var(--danger); color: white; margin-left: 4px; vertical-align: middle; }
    .nav-hamburger { display: none; background: none; border: none; color: var(--cream); font-size: 22px; cursor: pointer; padding: 4px 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .save-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,.08); color: #aaa; transition: all .2s; }
    .save-badge.saved { background: rgba(26,122,74,.3); color: #6ddca0; }

    /* LAYOUT */
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

    /* TABS */
    .tab-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .tab {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 13px; cursor: pointer; background: var(--card); color: var(--muted);
      transition: all .15s; white-space: nowrap;
    }
    .tab:hover { border-color: #aaa; color: var(--text); }
    .tab.on { background: var(--black); color: var(--cream); border-color: var(--black); }
    .tab.lib-on { background: var(--info-bg); color: var(--info); border-color: var(--info); }
    .tab.saus-on { background: var(--warn-bg); color: var(--warn); border-color: #d4a000; }
    .tab-add { padding: 6px 14px; border: 1px dashed var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: transparent; color: var(--muted); }
    .tab-add:hover { background: var(--card); }
    .new-badge { font-size: 9px; padding: 1px 5px; border-radius: 10px; background: var(--gold); color: var(--black); margin-left: 4px; vertical-align: middle; }

    /* CARD */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }

    /* FORM */
    .sec { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .sec:first-child { margin-top: 0; }
    .field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .field-label { font-size: 13px; color: var(--muted); min-width: 95px; flex-shrink: 0; }
    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .price-block { display: flex; flex-direction: column; gap: 4px; }
    .price-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    input, textarea, select {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 13px; color: var(--text); background: var(--card); font-family: inherit;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: #aaa; }
    textarea { resize: vertical; }

    /* INGREDIENT GRID */
    .ing-header { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1.8fr 56px; gap: 6px; margin-bottom: 4px; }
    .ing-row { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1.8fr 56px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .col-head { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .btn-pair { display: flex; gap: 3px; }
    .icon-btn {
      width: 26px; height: 26px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; cursor: pointer; font-size: 13px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted);
      transition: all .15s;
    }
    .icon-btn:hover.save { background: var(--success-bg); color: var(--success); border-color: var(--success); }
    .icon-btn:hover.del { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
    .add-row {
      width: 100%; padding: 7px; font-size: 13px; cursor: pointer;
      border: 1px dashed var(--border); background: transparent; color: var(--muted);
      border-radius: var(--radius); margin-top: 6px; transition: background .15s;
    }
    .add-row:hover { background: var(--bg); }

    /* PICKER */
    .picker-wrap { position: relative; margin-top: 8px; }
    .picker-dd {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      z-index: 99; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    .picker-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .picker-item:last-child { border-bottom: none; }
    .picker-item:hover { background: var(--bg); }
    .pi-meta { font-size: 11px; color: var(--muted); margin-left: 8px; }

    /* MARGIN BAR */
    .margin-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
      background: var(--bg); border-radius: var(--radius); padding: 14px; margin-top: 12px;
    }
    .mb-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .mb-val { font-size: 20px; font-weight: 700; }

    /* ALLERGENS */
    .al-tag {
      display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px;
      background: var(--bg); color: var(--muted); cursor: pointer; border: 1px solid var(--border);
      margin: 2px; transition: all .15s;
    }
    .al-tag.on { background: var(--danger-bg); color: var(--danger); border-color: #f0b0ae; }

    /* SAUSER */
    .saus-tab-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .saus-tab { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--card); color: var(--muted); }
    .saus-tab.on { background: var(--warn-bg); color: var(--warn); border-color: #d4a000; }
    .step-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--black); color: var(--gold); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* LIBRARY */
    .lib-row { display: grid; grid-template-columns: 1.8fr 0.7fr 0.6fr 1fr 1fr 0.8fr 56px; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .lib-row:last-child { border-bottom: none; }
    .lib-row input { background: var(--bg); }
    .lib-row input:focus { background: var(--card); border-color: var(--gold); }
    .lib-note { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 12px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); }

    /* SIDER */
    .side-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 6px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }

    /* EXPORT BUTTON */
    .export-btn {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
      background: var(--black); color: var(--cream); border: none; border-radius: var(--radius-lg);
      margin-top: 24px; letter-spacing: .01em; transition: opacity .15s;
    }
    .export-btn:hover { opacity: .85; }
    .export-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--black); color: var(--cream); padding: 10px 20px;
      border-radius: var(--radius); font-size: 13px; z-index: 999;
      opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .tab-del { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px; cursor: pointer; background: transparent; color: var(--danger); margin-left: 6px; }

    /* STATUS BADGES */
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 5px; vertical-align: middle; }
    .status-dot.testing { background: var(--gold); }
    .status-dot.godkjent { background: var(--success); }
    .status-dot.forkastet { background: var(--danger); }
    .status-btn { padding: 4px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--muted); transition: all .15s; }
    .status-btn.active-testing { background: var(--warn-bg); color: var(--warn); border-color: #d4a000; }
    .status-btn.active-godkjent { background: var(--success-bg); color: var(--success); border-color: var(--success); }
    .status-btn.active-forkastet { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    /* DISPLAY TOGGLE */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 13px; color: var(--muted); }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; transition: .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

    /* NOTES */
    .note-item { padding: 10px 12px; background: var(--bg); border-radius: var(--radius); margin-bottom: 6px; position: relative; }
    .note-text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    .note-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .note-del { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; opacity: 0; transition: opacity .15s; }
    .note-item:hover .note-del { opacity: 1; }
    .note-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .note-input-row textarea { flex: 1; min-height: 36px; }
    .note-add-btn { padding: 7px 16px; font-size: 13px; border: 1px solid var(--success); border-radius: var(--radius); background: var(--success-bg); color: var(--success); cursor: pointer; white-space: nowrap; flex-shrink: 0; align-self: flex-end; }

    /* DUPLICATE BUTTON */
    .dup-btn { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px; cursor: pointer; background: transparent; color: var(--info); margin-right: 6px; }
    .dup-btn:hover { background: var(--info-bg); border-color: var(--info); }

    /* LAGER */
    .lager-row { display: grid; grid-template-columns: 2fr 0.7fr 0.5fr 0.6fr 1fr 0.6fr 0.6fr 50px; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .lager-row input, .lager-row select { background: var(--bg); }
    .lager-row input:focus { background: var(--card); border-color: var(--gold); }
    .stock-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px; text-align: center; }
    .stock-ok { background: var(--success-bg); color: var(--success); }
    .stock-low { background: var(--warn-bg); color: var(--warn); }
    .stock-empty { background: var(--danger-bg); color: var(--danger); }
    .stock-adj { display: flex; align-items: center; gap: 2px; }
    .stock-adj button { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 15px; font-weight: 700; color: var(--muted); display: flex; align-items: center; justify-content: center; }
    .stock-adj button:hover { background: var(--bg); color: var(--text); }
    .stock-adj input { width: 50px; text-align: center; }
    .order-section { margin-top: 20px; padding: 20px; background: var(--bg); border-radius: var(--radius-lg); }
    .order-group { margin-bottom: 16px; }
    .order-group-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid var(--gold); }
    .order-row { display: grid; grid-template-columns: 2fr 1fr 0.6fr 1fr; gap: 8px; padding: 4px 0; font-size: 13px; }
    .order-total { font-weight: 700; text-align: right; padding-top: 6px; border-top: 1px solid var(--border); margin-top: 4px; font-size: 13px; }
    .order-actions { display: flex; gap: 8px; margin-top: 16px; }
    .order-actions button { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); }
    .order-actions button:hover { background: var(--bg); }
    .order-actions .primary { background: var(--black); color: var(--cream); border-color: var(--black); }

    @media print {
      header, .tab-row, .export-btn, .order-actions, .toast { display: none !important; }
      .container { padding: 0; max-width: 100%; }
      .order-section { background: white; padding: 0; }
    }

    /* DASHBOARD */
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .dash-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .dash-card-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 8px; }
    .dash-big { font-size: 32px; font-weight: 800; line-height: 1; }
    .dash-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .dash-list { list-style: none; padding: 0; }
    .dash-list li { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .dash-list li:last-child { border-bottom: none; }
    .dash-action { display: block; width: 100%; padding: 10px; font-size: 13px; font-weight: 600; text-align: center; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); cursor: pointer; color: var(--text); margin-top: 8px; transition: background .15s; }
    .dash-action:hover { background: var(--bg); }
    @media (max-width: 600px) { .dash-grid { grid-template-columns: 1fr; } }

    /* SYNC INDICATOR */
    .sync-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; transition: all .2s; }
    .sync-badge.online { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
    .sync-badge.offline { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

    @media (max-width: 600px) {
      /* Header */
      .header-top { padding: 6px 12px; gap: 8px; }
      .logo img { height: 80px; margin: -25px 0 -30px; }
      .header-nav { gap: 0; }
      .header-nav.dropdown-mode { display: none; }
      .header-nav.dropdown-mode.open { display: flex; }
      .nav-hamburger { display: block; }
      .nav-btn { padding: 5px 10px; font-size: 11px; }
      .header-right { gap: 4px; }
      .header-right a { font-size: 10px !important; padding: 2px 6px !important; }

      /* Layout */
      .container { padding: 12px 10px 60px; }
      .card { padding: 14px; }
      .tab { font-size: 12px; padding: 5px 10px; }
      .tab-add { font-size: 12px; padding: 5px 10px; }

      /* Ingredient grid */
      .ing-header, .ing-row { grid-template-columns: 2fr 0.8fr 0.8fr 28px; }
      .ing-header .col-head:nth-child(4), .ing-row input:nth-child(4) { display: none; }

      /* Library */
      .lib-row { grid-template-columns: 2fr 0.8fr 0.8fr 28px; }
      .lib-row :nth-child(4), .lib-row :nth-child(5), .lib-row :nth-child(6) { display: none; }

      /* Lager */
      .lager-row { grid-template-columns: 1.5fr 0.7fr 0.5fr 0.5fr 50px; font-size: 12px; }
      .lager-row :nth-child(5), .lager-row :nth-child(6) { display: none; }
      .stock-adj input { width: 40px; }

      /* Prices */
      .price-row { grid-template-columns: 1fr; }

      /* Side rows */
      .side-row { flex-wrap: wrap; gap: 6px; padding: 8px; }

      /* Dashboard */
      .dash-grid { grid-template-columns: 1fr; }
      .dash-big { font-size: 26px; }

      /* Touch targets */
      .icon-btn { width: 32px; height: 32px; font-size: 15px; }
      input, select, textarea { font-size: 16px !important; padding: 9px 10px; }
      .add-row { padding: 10px; }
      .status-btn { padding: 6px 14px; }
      .toggle { width: 44px; height: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo" onclick="setSection('dashboard')" style="cursor:pointer">
      <img src="logo.png" alt="The Smash">
    </div>
    <button class="nav-hamburger" id="nav-hamburger" onclick="toggleNav()">&#9776;</button>
    <nav class="header-nav" id="main-nav"></nav>
    <div class="header-right">
      <a href="display.html" target="_blank" style="font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(232,197,71,.15);color:var(--gold);text-decoration:none;white-space:nowrap">Menyvisning &#8599;</a>
    </div>
  </div>
</header>

<div class="container">
  <div class="tab-row" id="sub-tabs"></div>
  <div id="main-pane"></div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);align-items:center">
    <button onclick="exportData()" style="padding:8px 16px;font-size:12px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--muted);white-space:nowrap">Eksporter JSON</button>
    <button onclick="exportDocx()" style="padding:8px 16px;font-size:12px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--muted);white-space:nowrap">Eksporter Word</button>
    <label style="padding:8px 16px;font-size:12px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--muted);white-space:nowrap"><input type="file" accept=".json" onchange="importData(event)" style="display:none">Importer data</label>
    <span style="flex:1"></span>
    <span class="save-badge" id="save-badge">Laster...</span>
    <span class="sync-badge" id="sync-badge">...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script>
const ALLERGENS = ['Gluten','Egg','Melk','Sennep','Selleri','Soya','Sulfitt','Sesam','N\u00f8tter'];
const SK = 'thesmash-menu-v1';
const LK = 'thesmash-lib-v1';

// Bytt ut med ditt eget Firebase-prosjekt

// ---- STORAGE (Firebase + localStorage fallback) ----

function save() {
  try { localStorage.setItem(SK, JSON.stringify(S)); localStorage.setItem(LK, JSON.stringify(LIB)); }
  catch(e) {}

  if (firebaseReady && db) {
    ignoreNextFirebase = true;
    db.ref('menu').set(S).catch(e => console.error('Firebase save menu:', e));
    db.ref('library').set(LIB).catch(e => console.error('Firebase save lib:', e));
  }

  dirty = false;
  setSaveBadge('Lagret \u2713', true);
}

let dirty = false;

function scheduleSave() {
  dirty = true;
  setSaveBadge('Lagrer...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 400);
}

window.addEventListener('beforeunload', () => { if (dirty) save(); });
document.addEventListener('visibilitychange', () => { if (document.hidden && dirty) save(); });
setInterval(() => { if (dirty) save(); }, 5000);

function load() {
  // Load from localStorage first (instant)
  try {
    const m = localStorage.getItem(SK);
    if (m) {
      const parsed = JSON.parse(m);
      if (parsed && parsed.burgers) S = parsed;
    }
  } catch(e) { console.error('Feil ved lasting av meny:', e); }
  try {
    const l = localStorage.getItem(LK);
    if (l) {
      const parsed = JSON.parse(l);
      if (Array.isArray(parsed)) LIB = parsed;
    }
  } catch(e) { console.error('Feil ved lasting av bibliotek:', e); }

  // Migrate: ensure new fields exist on all items
  migrateData();

  LIB = LIB.map(l => ({
    n: l.n||'', w: l.w||'', c: l.c||'0', note: l.note||'', recipe: l.recipe||'',
    stock: l.stock !== undefined ? l.stock : 0,
    unit: l.unit || 'stk',
    minStock: l.minStock !== undefined ? l.minStock : 0,
    supplier: l.supplier || '',
    orderQty: l.orderQty !== undefined ? l.orderQty : 0,
    subIngs: l.subIngs || [],
    batchSize: l.batchSize !== undefined ? l.batchSize : 0,
    batchUnit: l.batchUnit || '',
    oppbevaring: l.oppbevaring || ''
  }));

  // Persist migrated data back to localStorage so display.html gets updated fields
  try { localStorage.setItem(SK, JSON.stringify(S)); localStorage.setItem(LK, JSON.stringify(LIB)); } catch(e) {}

  setSaveBadge('Innlastet \u2713', true);
  render();

  // Then listen for Firebase updates (realtime sync)
  if (firebaseReady && db) {
    db.ref('menu').on('value', snap => {
      if (ignoreNextFirebase) { ignoreNextFirebase = false; return; }
      const val = snap.val();
      if (val && val.burgers) {
        S = val;
        migrateData();
        localStorage.setItem(SK, JSON.stringify(S));
        render();
        setSaveBadge('Synkronisert \u2713', true);
      }
    });
    db.ref('library').on('value', snap => {
      const val = snap.val();
      if (val && Array.isArray(val)) {
        LIB = val.map(l => ({n: l.n||'', w: l.w||'', c: l.c||'0', note: l.note||'', recipe: l.recipe||''}));
        localStorage.setItem(LK, JSON.stringify(LIB));
        if (tab === 'lib') render();
      }
    });

    db.ref('.info/connected').on('value', snap => {
      setSyncBadge(snap.val() === true);
    });
  } else {
    setSyncBadge(false);
  }
}

function migrateData() {
  S.burgers.forEach(b => {
    if (!b.status) b.status = b.isNew ? 'testing' : 'godkjent';
    if (b.showOnDisplay === undefined) b.showOnDisplay = true;
    if (!b.notes) b.notes = [];
    if (b.bestselger === undefined) b.bestselger = false;
    if (b.utsolgt === undefined) b.utsolgt = false;
    if (b.solgt === undefined) b.solgt = 0;
  });
  if (S.sider) S.sider.forEach(s => {
    if (s.showOnDisplay === undefined) s.showOnDisplay = true;
    if (s.desc === undefined) s.desc = '';
    if (!s.variants) s.variants = [];
    if (s.utsolgt === undefined) s.utsolgt = false;
    if (s.solgt === undefined) s.solgt = 0;
  });
  // Sjekklister
  if (!S.sjekklister) S.sjekklister = {
    aapning: [

      {text:'Ta bilde/video av burger under tilberedning \u2014 vis smashing, ost som smelter, dampende patty', done:false},

      {text:'Planlegg \u00e9n uke-post: kulissene bak, ny oppskrift, eller kundehistorie', done:false},
    ]
  };
  // Holdbarhet
  if (!S.holdbarhet) S.holdbarhet = [];
  // Daglig logg
  if (!S.dagligLogg) S.dagligLogg = [];
  // Display-innstillinger
  if (!S.displaySettings) S.displaySettings = { dagNattMode: 'auto', dagFra: 8, dagTil: 20 };
  // Kalender
  if (!S.kalender) S.kalender = [];
  if (!S.oppskrifter) S.oppskrifter = DEFAULT.oppskrifter ? JSON.parse(JSON.stringify(DEFAULT.oppskrifter)) : [];
  if (!S.ukensTilbud) S.ukensTilbud = { enabled: false, title: 'Ukens tilbud', burger: '', side: '', drikke: '', pris: '', desc: '' };
  if (!S.komboSetup) S.komboSetup = { enabled: true, burger: '', side: '', drikke: '' };
  if (S.komboSetup.enabled === undefined) S.komboSetup.enabled = true;
  // Migrate: move sauser into oppskrifter
  if (S.sauser && S.sauser.length > 0) {
    for (const s of S.sauser) {
      const exists = S.oppskrifter.find(o => o.name.toLowerCase() === s.name.toLowerCase());
      if (!exists) S.oppskrifter.push(s);
    }
    S.sauser = [];
  }
}

function exportData() {
  const data = { menu: S, library: LIB };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'the-smash-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Data eksportert');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.menu && data.menu.burgers) {
        S = data.menu;
        migrateData();
        if (Array.isArray(data.library)) LIB = data.library;
        save();
        tab = 'b0';
        render();
        toast('Data importert');
      } else {
        toast('Ugyldig fil \u2014 mangler menydata');
      }
    } catch(err) {
      toast('Kunne ikke lese filen');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}


function setSaveBadge(msg, ok=false) {
  const el = document.getElementById('save-badge');
  if (el) { el.textContent = msg; el.className = 'save-badge' + (ok ? ' saved' : ''); }
}

// ---- TOAST ----

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ---- HELPERS ----

function cost(ings) { return ings.reduce((a, i) => a + parseFloat(i.c || '0'), 0); }

function updateMargin(i) {
  const b = S.burgers[i];
  const c = cost(b.ings);
  const pm0 = b.pattyMode || 'both';
  const pris = parseFloat(pm0 === 'enkel' ? b.pris_enkel : b.pris_dobbel) || 0;
  const margin = pris > 0 ? ((pris - c) / pris * 100) : 0;
  const marginColor = margin >= 75 ? 'var(--success)' : margin >= 60 ? 'var(--warn)' : 'var(--danger)';
  const bar = document.querySelector('.margin-bar');
  if (bar) {
    const vals = bar.querySelectorAll('.mb-val');
    if (vals[1]) vals[1].textContent = pris + ' kr';
    if (vals[2]) { vals[2].textContent = fmt(margin) + '%'; vals[2].style.color = marginColor; }
  }
}
function fmt(n) { return Math.round(n * 10) / 10; }
function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function saveToLib(ing) {
  if (!ing.n || !ing.n.trim()) { toast('Ingrediens mangler navn'); return; }
  const ex = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
  if (ex) { Object.assign(ex, ing); toast('Oppdatert i bibliotek'); }
  else { LIB.push({...ing, stock:0, unit:'stk', minStock:0, supplier:'', orderQty:0, recipe:''}); toast('Lagret: ' + ing.n); }
  scheduleSave();
  if (tab === 'lib') render();
}

function openLibPicker(bi, q) {
  const dd = document.getElementById('dd-' + bi);
  if (!dd) return;
  const res = q ? LIB.filter(l => l.n.toLowerCase().includes(q.toLowerCase())) : LIB.slice(0, 12);
  if (!res.length) { dd.style.display = 'none'; picker = null; return; }
  dd.innerHTML = res.map((l, idx) =>
    `<div class="picker-item" onmousedown="event.preventDefault();addFromLib(${bi}, LIB[${LIB.indexOf(l)}])">
      ${esc(l.n)}<span class="pi-meta">${esc(l.w)} \u00b7 ${esc(l.c)} kr</span></div>`
  ).join('');
  dd.style.display = 'block';
  picker = bi;
}

function closePicker() {
  if (picker !== null) {
    const dd = document.getElementById('dd-' + picker);
    if (dd) dd.style.display = 'none';
    picker = null;
  }
}

// ---- RENDER ----

let section = 'meny'; // 'meny' | 'oppskrifter' | 'bibliotek' | 'lager'

function getSection() {
  if (tab === 'dashboard') return 'dashboard';
  if (tab === 'kalender') return 'kalender';
  if (tab === 'oppskrifter') return 'oppskrifter';
  if (tab === 'lib') return 'bibliotek';
  if (tab === 'lager') return 'lager';
  if (tab === 'service') return 'service';
  if (tab === 'drift') return 'drift';
  if (tab.startsWith('b') || tab === 'sider') return 'meny';
  return section;
}

function setSection(s) {
  section = s;
  if (s === 'dashboard') tab = 'dashboard';
  else if (s === 'kalender') tab = 'kalender';
  else if (s === 'bibliotek') tab = 'lib';
  else if (s === 'meny' && !tab.startsWith('b') && tab !== 'sider') tab = 'b0';
  else if (s === 'oppskrifter') tab = 'oppskrifter';
  else if (s === 'lager') tab = 'lager';
  else if (s === 'service') tab = 'service';
  else if (s === 'drift') tab = 'drift';
  render();
}

function renderNav() {
  const s = getSection();
  const lowCount = getLowStockCount();
  const isMobile = window.innerWidth <= 600;
  const navEl = document.getElementById('main-nav');
  const nav = [
    `<button class="nav-btn${s==='dashboard'?' on':''}" onclick="setSection('dashboard');closeNav()">Dashboard</button>`,
    `<button class="nav-btn${s==='meny'?' on':''}" onclick="setSection('meny');closeNav()">Menyvalg</button>`,
    `<button class="nav-btn${s==='service'?' on':''}" onclick="setSection('service');closeNav()">Service</button>`,
    `<button class="nav-btn${s==='oppskrifter'?' on':''}" onclick="setSection('oppskrifter');closeNav()">Oppskrifter</button>`,
    `<button class="nav-btn${s==='lager'?' on':''}" onclick="setSection('lager');closeNav()">Lager${lowCount>0?'<span class="nav-badge">'+lowCount+'</span>':''}</button>`,
    `<button class="nav-btn${s==='drift'?' on':''}" onclick="setSection('drift');closeNav()">Drift</button>`,
    `<button class="nav-btn${s==='bibliotek'?' on':''}" onclick="setSection('bibliotek');closeNav()">Bibliotek</button>`,
  ];
  navEl.innerHTML = nav.join('');
  if (isMobile) {
    navEl.classList.add('dropdown-mode');
  } else {
    navEl.classList.remove('dropdown-mode', 'open');
  }
}

function toggleNav() {
  document.getElementById('main-nav').classList.toggle('open');
}
function closeNav() {
  document.getElementById('main-nav').classList.remove('open');
}
window.addEventListener('resize', () => renderNav());

function renderSubTabs() {
  const s = getSection();
  const el = document.getElementById('sub-tabs');
  if (s === 'meny') {
    const tabs = [
      ...S.burgers.map((b, i) => {
        const st = b.status || 'godkjent';
        const dotClass = 'status-dot ' + st;
        return `<button class="tab${tab==='b'+i?' on':''}" onclick="tab='b${i}';render()">${esc(b.name)}<span class="${dotClass}"></span>${b.isNew?'<span class="new-badge">NY</span>':''}</button>`;
      }),
      `<button class="tab${tab==='sider'?' on':''}" onclick="tab='sider';render()">Tilbeh\u00f8r & drikke</button>`,
      `<button class="tab-add" onclick="addBurger()">+ Ny burger</button>`,
    ];
    el.innerHTML = tabs.join('');
  } else {
    el.innerHTML = '';
  }
}

function render() {
  try {
    renderNav();
    renderSubTabs();
    const pane = document.getElementById('main-pane');
    if (tab === 'dashboard') {
      pane.innerHTML = renderDashboard();
    } else if (tab.startsWith('b')) {
      const i = parseInt(tab.slice(1));
      if (i < S.burgers.length) pane.innerHTML = renderBurger(i);
      else { tab = 'b0'; render(); return; }
    } else if (tab === 'sider') {
      pane.innerHTML = renderSider();
    } else if (tab === 'oppskrifter') {
      pane.innerHTML = renderOppskrifter();
    } else if (tab === 'service') {
      pane.innerHTML = renderService();
    } else if (tab === 'drift') {
      pane.innerHTML = renderDrift();
    } else if (tab === 'lib') {
      pane.innerHTML = renderLibrary();
    } else if (tab === 'lager') {
      pane.innerHTML = renderLager();
    }
  } catch(e) {
    console.error('Render-feil:', e);
    document.getElementById('main-pane').innerHTML = `<div class="card" style="color:var(--danger)">
      <p>Noe gikk galt: ${e.message}</p>
      <button class="add-row" onclick="location.reload()" style="margin-top:12px">Last inn siden p\u00e5 nytt</button>
    </div>`;
  }
}

// ---- BURGER ----

function renderBurger(i) {
  const b = S.burgers[i];
  const c = cost(b.ings);
  const pm0 = b.pattyMode || 'both';
  const pris = parseFloat(pm0 === 'enkel' ? b.pris_enkel : b.pris_dobbel) || 0;
  const margin = pris > 0 ? ((pris - c) / pris * 100) : 0;
  const marginColor = margin >= 75 ? 'var(--success)' : margin >= 60 ? 'var(--warn)' : 'var(--danger)';
  const st = b.status || 'godkjent';

  let html = `<div class="card">`;

  // Status + Display toggle row
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">`;
  html += `<div style="display:flex;align-items:center;gap:4px">
    <span class="field-label" style="min-width:auto">Status:</span>
    <button class="status-btn${st==='testing'?' active-testing':''}" onclick="S.burgers[${i}].status='testing';scheduleSave();render()">Testing</button>
    <button class="status-btn${st==='godkjent'?' active-godkjent':''}" onclick="S.burgers[${i}].status='godkjent';scheduleSave();render()">Godkjent</button>
    <button class="status-btn${st==='forkastet'?' active-forkastet':''}" onclick="S.burgers[${i}].status='forkastet';scheduleSave();render()">Forkastet</button>
  </div>`;
  html += `<div style="display:flex;gap:16px;align-items:center">
    <div class="toggle-wrap">
      <span class="toggle-label">Vis p\u00e5 display</span>
      <label class="toggle"><input type="checkbox" ${b.showOnDisplay?'checked':''} onchange="S.burgers[${i}].showOnDisplay=this.checked;scheduleSave()"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label">\u2b50 Bestselger</span>
      <label class="toggle"><input type="checkbox" ${b.bestselger?'checked':''} onchange="S.burgers[${i}].bestselger=this.checked;scheduleSave()"><span class="toggle-slider"></span></label>
    </div>
  </div>`;
  html += `</div>`;

  // Navn & priser
  html += `<div class="sec">Produkt</div>`;
  html += `<div class="field-row">
    <span class="field-label">Navn</span>
    <input value="${esc(b.name)}" oninput="S.burgers[${i}].name=this.value;scheduleSave();renderSubTabs()">
  </div>`;

  // Patty mode
  const pm = b.pattyMode || 'both';
  html += `<div class="field-row">
    <span class="field-label">Patty-valg</span>
    <div style="display:flex;gap:4px">
      <button class="tab${pm==='both'?' on':''}" style="font-size:12px;padding:4px 12px" onclick="S.burgers[${i}].pattyMode='both';scheduleSave();render()">Begge</button>
      <button class="tab${pm==='dobbel'?' on':''}" style="font-size:12px;padding:4px 12px" onclick="S.burgers[${i}].pattyMode='dobbel';scheduleSave();render()">Kun dobbel</button>
      <button class="tab${pm==='enkel'?' on':''}" style="font-size:12px;padding:4px 12px" onclick="S.burgers[${i}].pattyMode='enkel';scheduleSave();render()">Kun enkel</button>
    </div>
  </div>`;

  html += `<div class="price-row"${pm==='enkel'||pm==='dobbel'?' style="grid-template-columns:1fr"':''}>`;
  if (pm !== 'enkel') {
    html += `<div class="price-block">
      <span class="price-label">${pm==='both'?'Dobbel (standard)':'Pris'}</span>
      <input type="number" value="${esc(b.pris_dobbel)}" oninput="S.burgers[${i}].pris_dobbel=this.value;scheduleSave();updateMargin(${i})" onblur="render()">
    </div>`;
  }
  if (pm !== 'dobbel') {
    html += `<div class="price-block">
      <span class="price-label">${pm==='both'?'Liten':'Pris'}</span>
      <input type="number" value="${esc(b.pris_enkel)}" placeholder="\u2014" oninput="S.burgers[${i}].pris_enkel=this.value;scheduleSave();updateMargin(${i})" onblur="render()">
    </div>`;
  }
  html += `</div>`;

  // Tips
  html += `<div class="field-row">
    <span class="field-label">Driftstips</span>
    <input value="${esc(b.tips||'')}" placeholder="Valgfritt..." oninput="S.burgers[${i}].tips=this.value;scheduleSave()">
  </div>`;

  // Ingredienser
  html += `<div class="sec">Ingredienser</div>`;
  html += `<div class="ing-header">
    <span class="col-head">Ingrediens</span>
    <span class="col-head">Mengde</span>
    <span class="col-head">Kost (kr)</span>
    <span class="col-head">Merknad</span>
    <span></span>
  </div>`;

  b.ings.forEach((ing, j) => {
    const libMatch = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
    const hasRecipe = libMatch && libMatch.recipe && libMatch.recipe.trim();
    html += `<div class="ing-row">
      <input value="${esc(ing.n)}" oninput="S.burgers[${i}].ings[${j}].n=this.value;scheduleSave()">
      <input value="${esc(ing.w)}" oninput="S.burgers[${i}].ings[${j}].w=this.value;scheduleSave()">
      <input type="number" step="0.1" value="${esc(ing.c)}" oninput="S.burgers[${i}].ings[${j}].c=this.value;scheduleSave();updateMargin(${i})" onblur="render()">
      <input value="${esc(ing.note)}" placeholder="" oninput="S.burgers[${i}].ings[${j}].note=this.value;scheduleSave()">
      <div class="btn-pair">
        <button class="icon-btn save" onclick="saveToLib(S.burgers[${i}].ings[${j}])" title="Lagre til bibliotek">\u2191</button>
        <button class="icon-btn del" onclick="S.burgers[${i}].ings.splice(${j},1);scheduleSave();render()" title="Fjern">\u00d7</button>
      </div>
    </div>`;
    if (hasRecipe) {
      html += `<div style="grid-column:1/-1;margin:-4px 0 6px;padding:8px 12px;background:var(--warn-bg);border-radius:var(--radius);font-size:12px;color:var(--warn);line-height:1.5;white-space:pre-wrap">\u270e ${esc(libMatch.recipe)}</div>`;
    }
  });

  // Legg til ingrediens
  html += `<button class="add-row" onclick="S.burgers[${i}].ings.push({n:'',w:'',c:'0',note:''});scheduleSave();render()">+ Legg til ingrediens manuelt</button>`;

  // Picker fra bibliotek
  html += `<div class="picker-wrap" id="pw-${i}">
    <input id="pi-${i}" placeholder="S\u00f8k i bibliotek..." autocomplete="off"
      onclick="openLibPicker(${i},this.value)"
      onfocus="openLibPicker(${i},this.value)"
      oninput="openLibPicker(${i},this.value)"
      onblur="setTimeout(closePicker,200)">
    <div class="picker-dd" id="dd-${i}" style="display:none"></div>
  </div>`;

  // Margin bar
  html += `<div class="margin-bar">
    <div><div class="mb-label">R\u00e5varekost</div><div class="mb-val">${fmt(c)} kr</div></div>
    <div><div class="mb-label">Pris${pm0==='enkel'?' (enkel)':pm0==='dobbel'?' (dobbel)':' (dobbel)'}</div><div class="mb-val">${pris} kr</div></div>
    <div><div class="mb-label">Bruttomargin</div><div class="mb-val" style="color:${marginColor}">${fmt(margin)}%</div></div>
  </div>`;

  // Allergener
  html += `<div class="sec">Allergener</div>`;
  html += ALLERGENS.map(a =>
    `<span class="al-tag${b.al && b.al.includes(a)?' on':''}" onclick="toggleAllergen(${i},'${a}')">${a}</span>`
  ).join('');

  // Smaksnotater
  html += `<div class="sec">Smaksnotater</div>`;
  const notes = b.notes || [];
  if (notes.length === 0) {
    html += `<div style="font-size:13px;color:var(--muted);margin-bottom:8px">Ingen notater enn\u00e5. Legg til observasjoner fra testing.</div>`;
  }
  // Newest first
  const sortedNotes = [...notes].reverse();
  sortedNotes.forEach((note, ni) => {
    const realIdx = notes.length - 1 - ni;
    html += `<div class="note-item">
      <div class="note-text">${esc(note.text)}</div>
      <div class="note-meta">${esc(note.date)}${note.author ? ' \u2014 ' + esc(note.author) : ''}</div>
      <button class="note-del" onclick="S.burgers[${i}].notes.splice(${realIdx},1);scheduleSave();render()" title="Slett">\u00d7</button>
    </div>`;
  });
  html += `<div class="note-input-row">
    <textarea id="note-input-${i}" placeholder="Skriv en observasjon..." rows="2"></textarea>
    <button class="note-add-btn" onclick="addNote(${i})">Legg til</button>
  </div>`;

  // Action buttons: Dupliser + Slett
  html += `<div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:4px;align-items:center">
      <span style="font-size:11px;color:var(--muted)">Rekkef\u00f8lge:</span>
      <button class="icon-btn" onclick="moveBurger(${i},-1)" title="Flytt opp" ${i===0?'disabled style="opacity:.3"':''}>&#9650;</button>
      <button class="icon-btn" onclick="moveBurger(${i},1)" title="Flytt ned" ${i===S.burgers.length-1?'disabled style="opacity:.3"':''}>&#9660;</button>
    </div>
    <div style="display:flex;gap:6px">
      <button class="dup-btn" onclick="duplicateBurger(${i})">Dupliser burger</button>
      <button class="tab-del" onclick="deleteBurger(${i})">Slett denne burgeren</button>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

function toggleAllergen(bi, allergen) {
  const b = S.burgers[bi];
  if (!b.al) b.al = [];
  const idx = b.al.indexOf(allergen);
  if (idx >= 0) b.al.splice(idx, 1);
  else b.al.push(allergen);
  scheduleSave();
  render();
}

function addBurger() {
  const id = 'custom_' + Date.now();
  S.burgers.push({
    id, name:'Ny burger', pris_dobbel:'', pris_enkel:'', pattyMode:'both', isNew:true,
    status:'testing', showOnDisplay:false, notes:[],
    ings:[], al:[], tips:''
  });
  tab = 'b' + (S.burgers.length - 1);
  scheduleSave();
  render();
  toast('Ny burger opprettet');
}

function moveBurger(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= S.burgers.length) return;
  [S.burgers[i], S.burgers[j]] = [S.burgers[j], S.burgers[i]];
  tab = 'b' + j;
  scheduleSave();
  render();
}

function moveStep(arr, i, dir) {
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  scheduleSave();
  render();
}

function moveSide(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= S.sider.length) return;
  [S.sider[i], S.sider[j]] = [S.sider[j], S.sider[i]];
  scheduleSave();
  render();
}

function deleteBurger(i) {
  if (!confirm('Slett "' + S.burgers[i].name + '"?')) return;
  S.burgers.splice(i, 1);
  tab = 'b0';
  scheduleSave();
  render();
  toast('Burger slettet');
}

function duplicateBurger(i) {
  const orig = S.burgers[i];
  const copy = JSON.parse(JSON.stringify(orig));
  copy.id = 'custom_' + Date.now();
  copy.name = orig.name + ' (kopi)';
  copy.status = 'testing';
  copy.showOnDisplay = false;
  copy.isNew = true;
  copy.notes = [];
  S.burgers.push(copy);
  tab = 'b' + (S.burgers.length - 1);
  scheduleSave();
  render();
  toast('Burger duplisert');
}

function addNote(bi) {
  const input = document.getElementById('note-input-' + bi);
  if (!input || !input.value.trim()) return;
  if (!S.burgers[bi].notes) S.burgers[bi].notes = [];
  const now = new Date();
  const dateStr = now.toLocaleDateString('no-NO', {day:'numeric',month:'short',year:'numeric'}) + ' ' + now.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'});
  S.burgers[bi].notes.push({
    text: input.value.trim(),
    date: dateStr,
    author: ''
  });
  scheduleSave();
  render();
  toast('Notat lagt til');
}

// ---- SIDER / TILBEH\u00d8R ----

function renderSider() {
  let html = `<div class="card">`;
  html += `<div class="sec">Tilbeh\u00f8r og drikke</div>`;

  S.sider.forEach((s, i) => {
    if (!s.ings) s.ings = [];
    if (s.showOnDisplay === undefined) s.showOnDisplay = true;
    const hasIngs = s.ings.length > 0;
    const expanded = siderExpanded && siderExpanded[i];

    html += `<div class="side-row" style="flex-wrap:wrap">
      <input value="${esc(s.name)}" style="flex:2" oninput="S.sider[${i}].name=this.value;scheduleSave()">
      <input type="number" value="${esc(s.pris)}" style="flex:0.5;text-align:right" oninput="S.sider[${i}].pris=this.value;scheduleSave()" onblur="render()">
      <span style="font-size:12px;color:var(--muted);flex-shrink:0">kr</span>
      <label class="toggle" title="Vis p\u00e5 display"><input type="checkbox" ${s.showOnDisplay?'checked':''} onchange="S.sider[${i}].showOnDisplay=this.checked;scheduleSave()"><span class="toggle-slider"></span></label>
      <button class="icon-btn" onclick="moveSide(${i},-1)" title="Flytt opp" ${i===0?'disabled style="opacity:.3"':''}>&#9650;</button>
      <button class="icon-btn" onclick="moveSide(${i},1)" title="Flytt ned" ${i===S.sider.length-1?'disabled style="opacity:.3"':''}>&#9660;</button>
      <button class="icon-btn" onclick="toggleSiderExpand(${i})" title="${hasIngs ? 'Vis/skjul ingredienser' : 'Legg til ingredienser'}" style="${expanded?'background:var(--info-bg);color:var(--info);border-color:var(--info)':''}">\u25BC</button>
      <button class="icon-btn del" onclick="S.sider.splice(${i},1);scheduleSave();render()" title="Fjern">\u00d7</button>
    </div>
    <div style="padding:4px 12px 8px;margin-bottom:6px;background:var(--bg);border-radius:0 0 var(--radius) var(--radius);border:1px solid var(--border);border-top:none;margin-top:-7px">
      <input value="${esc(s.desc||'')}" placeholder="Beskrivelse for display..." style="font-size:12px;color:var(--muted);border:1px dashed var(--border)" oninput="S.sider[${i}].desc=this.value;scheduleSave()">
      ${renderVariants(i, s)}
    </div>`;

    if (expanded) {
      const c = cost(s.ings);
      const pris = parseFloat(s.pris) || 0;
      const margin = pris > 0 ? ((pris - c) / pris * 100) : 0;
      const marginColor = margin >= 75 ? 'var(--success)' : margin >= 60 ? 'var(--warn)' : 'var(--danger)';

      html += `<div style="padding:12px 0 12px 0;border-bottom:1px solid var(--border)">`;
      html += `<div class="ing-header">
        <span class="col-head">Ingrediens</span>
        <span class="col-head">Mengde</span>
        <span class="col-head">Kost (kr)</span>
        <span class="col-head">Merknad</span>
        <span></span>
      </div>`;

      s.ings.forEach((ing, j) => {
        html += `<div class="ing-row">
          <input value="${esc(ing.n)}" oninput="S.sider[${i}].ings[${j}].n=this.value;scheduleSave()">
          <input value="${esc(ing.w)}" oninput="S.sider[${i}].ings[${j}].w=this.value;scheduleSave()">
          <input type="number" step="0.1" value="${esc(ing.c)}" oninput="S.sider[${i}].ings[${j}].c=this.value;scheduleSave()" onblur="render()">
          <input value="${esc(ing.note)}" oninput="S.sider[${i}].ings[${j}].note=this.value;scheduleSave()">
          <div class="btn-pair">
            <button class="icon-btn save" onclick="saveToLib(S.sider[${i}].ings[${j}])" title="Lagre til bibliotek">\u2191</button>
            <button class="icon-btn del" onclick="S.sider[${i}].ings.splice(${j},1);scheduleSave();render()">\u00d7</button>
          </div>
        </div>`;
      });

      html += `<button class="add-row" onclick="S.sider[${i}].ings.push({n:'',w:'',c:'0',note:''});scheduleSave();render()">+ Legg til ingrediens</button>`;

      html += `<div class="margin-bar">
        <div><div class="mb-label">R\u00e5varekost</div><div class="mb-val">${fmt(c)} kr</div></div>
        <div><div class="mb-label">Pris</div><div class="mb-val">${pris} kr</div></div>
        <div><div class="mb-label">Bruttomargin</div><div class="mb-val" style="color:${marginColor}">${fmt(margin)}%</div></div>
      </div>`;

      html += `</div>`;
    }
  });

  html += `<button class="add-row" onclick="S.sider.push({name:'',pris:'',showOnDisplay:true,variants:[],ings:[]});scheduleSave();render()">+ Legg til produkt</button>`;
  html += `</div>`;

  // Kombo-oppsett
  html += renderKomboSetup();

  // Ukens tilbud
  html += renderUkensTilbud();

  return html;
}

function renderKomboSetup() {
  const ks = S.komboSetup || {};
  const burgerOpts = [];
  S.burgers.filter(b => b.showOnDisplay !== false).forEach(b => {
    const pm = b.pattyMode || 'both';
    if (pm === 'both') {
      burgerOpts.push(b.name + ' dobbel');
      burgerOpts.push(b.name + ' enkel');
    } else if (pm === 'dobbel') {
      burgerOpts.push(b.name + ' dobbel');
    } else {
      burgerOpts.push(b.name + ' enkel');
    }
  });
  const sideOptions = S.sider.filter(s => !s.name.toLowerCase().includes('kombo')).map(s => s.name);

function addOppNote(idx) {
  const input = document.getElementById('opp-note-input-' + idx);
  if (!input || !input.value.trim()) return;

  const now = new Date();
  const dateStr = now.toLocaleDateString('no-NO', {day:'numeric',month:'short',year:'numeric'}) + ' ' + now.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'});
  S.oppskrifter[idx].notes.push({ text: input.value.trim(), date: dateStr, author: '' });
  scheduleSave();

}

function makeOppskriftBatch(idx) {
  const o = S.oppskrifter[idx];
  if (!o || !o.ings || o.ings.length === 0) return;

  const missing = [];
  for (const ing of o.ings) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
    if (libMatch) {
      const need = parseAmount(ing.a);
      if (need > 0 && libMatch.stock < need) {
        missing.push(`${ing.n}: trenger ${ing.a}, har ${libMatch.stock} ${libMatch.unit}`);
      }
    }
  }

  if (missing.length > 0) {
    if (!confirm('Mangler nok av:\n\n' + missing.join('\n') + '\n\nLag batch likevel?')) return;
  }

  for (const ing of o.ings) {
    const libMatch = LIB.find(l => l.n.toLowerCase() === ing.n.toLowerCase());
    if (libMatch) {
      const need = parseAmount(ing.a);
      if (need > 0) {
        libMatch.stock = Math.max(0, libMatch.stock - need);
      }
    }
  }

  scheduleSave();
  render();
  toast(`Batch laget: ${o.name}`);
}

async function exportOppskrift(idx) {
  const o = S.oppskrifter[idx];
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle } = docx;
  const noBorder = { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
  const noBorders = { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder };

  const sections = [];

  sections.push(new Paragraph({
    children: [new TextRun({ text: o.name, bold: true, size: 36, font: 'Arial' })],
    spacing: { after: 100 },
  }));

  if (o.desc) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: o.desc, size: 20, color: '888888', font: 'Arial' })],
      spacing: { after: 200 },
    }));
  }

  const ings = o.ings || [];
  if (ings.length > 0) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Ingredienser', bold: true, size: 26, font: 'Arial' })],
      spacing: { before: 200, after: 100 },
    }));

    const headerRow = new TableRow({
      children: ['Ingrediens', 'Mengde', 'Merknad'].map(h =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: h, bold: true, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    });

    const ingRows = ings.map(ing => new TableRow({
      children: [ing.n || '', ing.a || '', ing.note || ''].map(t =>
        new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: t, size: 18, font: 'Arial' })] })],
          borders: noBorders,
        })
      ),
    }));

    sections.push(new Table({
      rows: [headerRow, ...ingRows],
      width: { size: 100, type: WidthType.PERCENTAGE },
    }));
  }

  const steps = o.steps || [];
  if (steps.length > 0) {
    sections.push(new Paragraph({
      children: [new TextRun({ text: 'Fremgangsm\u00e5te', bold: true, size: 26, font: 'Arial' })],
      spacing: { before: 300, after: 100 },
    }));
    steps.forEach((step, j) => {
      sections.push(new Paragraph({
        children: [new TextRun({ text: `${j+1}. ${step}`, size: 20, font: 'Arial' })],
        spacing: { after: 60 },
      }));
    });
  }

  sections.push(new Paragraph({
    children: [new TextRun({ text: 'THE SMASH \u2014 ' + new Date().toLocaleDateString('no-NO'), size: 16, color: 'AAAAAA', font: 'Arial' })],
    spacing: { before: 400 },
  }));

  const doc = new Document({ sections: [{ children: sections }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = o.name.replace(/[^a-zA-Z0-9\u00e6\u00f8\u00e5\u00c6\u00d8\u00c5 ]/g, '') + '_oppskrift.docx';
  a.click();
  URL.revokeObjectURL(url);
  toast('Oppskrift eksportert');
}

// ---- DASHBOARD ----

function renderDashboard() {
  const now = new Date();
  const totalSolgt = S.burgers.reduce((a,b) => a + (b.solgt||0), 0) + S.sider.reduce((a,s) => a + (s.solgt||0), 0);
  const lowStock = getLowStockCount();
  const aapning = S.sjekklister?.aapning || [];
  const stenging = S.sjekklister?.stenging || [];
  const marked = S.sjekklister?.markedsforing || [];
  const aapDone = aapning.filter(i => i.done).length;
  const stenDone = stenging.filter(i => i.done).length;
  const markDone = marked.filter(i => i.done).length;
  const holdbarhet = S.holdbarhet || [];
  const expiringSoon = holdbarhet.filter(h => h.expiry && h.expiry > Date.now() && (h.expiry - Date.now()) < 4 * 3600000);
  const expired = holdbarhet.filter(h => h.expiry && h.expiry <= Date.now());
  const utsolgte = S.burgers.filter(b => b.utsolgt).length + S.sider.filter(s => s.utsolgt).length;

  let html = '';

  // Velkomst
  html += `<div style="margin-bottom:16px">
    <div style="font-size:22px;font-weight:800">God ${now.getHours()<12?'morgen':'ettermiddag'}</div>
    <div style="font-size:13px;color:var(--muted)">${now.toLocaleDateString('no-NO', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
  </div>`;

  // Varsler
  const warnings = [];
  if (expired.length > 0) warnings.push({text: expired.length + ' produkt' + (expired.length>1?'er':'') + ' har utg\u00e5tt holdbarhet', color: 'danger', go: 'drift'});
  if (expiringSoon.length > 0) warnings.push({text: expiringSoon.length + ' produkt' + (expiringSoon.length>1?'er':'') + ' utl\u00f8per snart (< 4t)', color: 'warn', go: 'drift'});
  if (lowStock > 0) warnings.push({text: lowStock + ' ingrediens' + (lowStock>1?'er':'') + ' under minimumsniv\u00e5', color: 'warn', go: 'lager'});
  if (utsolgte > 0) warnings.push({text: utsolgte + ' menyvalg er markert utsolgt', color: 'danger', go: 'service'});

  if (warnings.length > 0) {
    html += `<div style="margin-bottom:12px">`;
    warnings.forEach(w => {
      html += `<div onclick="setSection('${w.go}')" style="padding:10px 14px;margin-bottom:4px;border-radius:var(--radius);background:var(--${w.color}-bg);color:var(--${w.color});font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--${w.color})">\u26a0 ${w.text}</div>`;
    });
    html += `</div>`;
  }

  // Tall-kort
  html += `<div class="dash-grid">`;

  // Salg i dag
  html += `<div class="dash-card" onclick="setSection('service')" style="cursor:pointer">
    <div class="dash-card-title">Solgt i dag</div>
    <div class="dash-big">${totalSolgt}</div>
    <div class="dash-sub">`;
  const topSeller = [...S.burgers].sort((a,b) => (b.solgt||0) - (a.solgt||0))[0];
  if (topSeller && topSeller.solgt > 0) html += `Mest solgt: ${esc(topSeller.name)} (${topSeller.solgt})`;
  html += `</div></div>`;

  // Lager
  html += `<div class="dash-card" onclick="setSection('lager')" style="cursor:pointer">
    <div class="dash-card-title">Lager</div>
    <div class="dash-big" style="color:${lowStock>0?'var(--warn)':'var(--success)'}">${lowStock}</div>
    <div class="dash-sub">${lowStock > 0 ? 'varer under minimumsniv\u00e5' : 'Alt p\u00e5 lager OK'}</div>
  </div>`;

  // \u00c5pning
  html += `<div class="dash-card" onclick="setSection('drift')" style="cursor:pointer">
    <div class="dash-card-title">\u00c5pning</div>
    <div class="dash-big" style="color:${aapDone===aapning.length&&aapning.length>0?'var(--success)':'var(--text)'}">${aapDone}/${aapning.length}</div>
    <div class="dash-sub">${aapDone===aapning.length&&aapning.length>0?'Ferdig!':'punkter fullf\u00f8rt'}</div>
  </div>`;

  // Holdbarhet
  html += `<div class="dash-card" onclick="setSection('drift')" style="cursor:pointer">
    <div class="dash-card-title">Holdbarhet</div>
    <div class="dash-big" style="color:${expired.length>0?'var(--danger)':expiringSoon.length>0?'var(--warn)':'var(--success)'}">${expired.length + expiringSoon.length}</div>
    <div class="dash-sub">${expired.length > 0 ? expired.length + ' utg\u00e5tt' : expiringSoon.length > 0 ? 'utl\u00f8per snart' : 'Alt OK'}</div>
  </div>`;

  html += `</div>`;

  // Sjekklister status
  html += `<div class="dash-grid">`;

  // Markedsf\u00f8ring
  html += `<div class="dash-card" onclick="setSection('drift')" style="cursor:pointer">
    <div class="dash-card-title">Markedsf\u00f8ring</div>
    <div class="dash-big" style="color:${markDone===marked.length&&marked.length>0?'var(--success)':'var(--text)'}">${markDone}/${marked.length}</div>
    <div class="dash-sub">${markDone===marked.length&&marked.length>0?'Alt gjort i dag':'gjenstår'}</div>
  </div>`;

  // Stenging
  html += `<div class="dash-card" onclick="setSection('drift')" style="cursor:pointer">
    <div class="dash-card-title">Stenging</div>
    <div class="dash-big" style="color:${stenDone===stenging.length&&stenging.length>0?'var(--success)':'var(--text)'}">${stenDone}/${stenging.length}</div>
    <div class="dash-sub">${stenDone===stenging.length&&stenging.length>0?'Ferdig!':'punkter fullf\u00f8rt'}</div>
  </div>`;

  html += `</div>`;

  // Topp-selgere fra siste logg
  const logg = S.dagligLogg || [];
  if (logg.length > 0) {
    const siste = logg[logg.length - 1];
    const topItems = (siste.salg || []).filter(s => s.antall > 0).sort((a,b) => b.antall - a.antall).slice(0, 5);
    if (topItems.length > 0) {
      html += `<div class="dash-card">
        <div class="dash-card-title">Forrige dag \u2014 ${esc(siste.dato)}</div>
        <ul class="dash-list">`;
      topItems.forEach(item => {
        html += `<li><span>${esc(item.name)}</span><span style="font-weight:700">${item.antall}</span></li>`;
      });
      html += `</ul>
        <div class="dash-sub" style="margin-top:6px">Totalt: ${siste.totalSolgt} solgt</div>
      </div>`;
    }
  }

  // Kalender
  html += renderKalender();

  // Hurtigknapper
  html += `<div class="dash-grid" style="margin-top:4px">
    <button class="dash-action" style="background:var(--success-bg);color:var(--success);border-color:var(--success)" onclick="setSection('service')">Start service \u2192</button>
    <button class="dash-action" onclick="avsluttDag()">Avslutt dag</button>
  </div>`;

  return html;
}

function renderDrift() {

  html += renderSjekkliste('aapning', '\u00c5pning av vogn');

function renderSjekkliste(key, title) {
  const list = S.sjekklister[key] || [];
  const done = list.filter(i => i.done).length;
  const total = list.length;
  const allDone = done === total && total > 0;

  let html = `<div class="card">`;
  html += `<div style="display:flex;align-items:center;justify-content:space-between">`;
  html += `<div class="sec" style="margin:0;border:none;padding:0">${title}</div>`;
  html += `<span style="font-size:12px;color:${allDone?'var(--success)':'var(--muted)'};font-weight:600">${done}/${total}</span>`;
  html += `</div>`;

  list.forEach((item, i) => {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;${item.done?'opacity:0.5':''}" onclick="S.sjekklister['${key}'][${i}].done=!S.sjekklister['${key}'][${i}].done;scheduleSave();render()">
      <span style="width:22px;height:22px;border-radius:6px;border:2px solid ${item.done?'var(--success)':'var(--border)'};background:${item.done?'var(--success)':'transparent'};display:flex;align-items:center;justify-content:center;color:white;font-size:13px;flex-shrink:0">${item.done?'\u2713':''}</span>
      <span style="font-size:13px;${item.done?'text-decoration:line-through':''}">${esc(item.text)}</span>
      <button class="icon-btn del" style="margin-left:auto" onclick="event.stopPropagation();S.sjekklister['${key}'].splice(${i},1);scheduleSave();render()">\u00d7</button>
    </div>`;
  });

  html += `<div style="display:flex;gap:6px;margin-top:8px">
    <button class="add-row" style="flex:1" onclick="S.sjekklister['${key}'].push({text:prompt('Nytt punkt:')||'',done:false});if(!S.sjekklister['${key}'][S.sjekklister['${key}'].length-1].text)S.sjekklister['${key}'].pop();scheduleSave();render()">+ Legg til punkt</button>
    ${done>0?`<button class="add-row" style="flex:0;padding:7px 14px;white-space:nowrap" onclick="S.sjekklister['${key}'].forEach(i=>i.done=false);scheduleSave();render()">Nullstill</button>`:''}
  </div>`;

  html += `</div>`;
  return html;
}

function renderHoldbarhet() {
  const items = S.holdbarhet || [];
  const now = Date.now();

  let html = `<div class="card">`;
  html += `<div class="sec">Holdbarhet</div>`;
  html += `<div class="lib-note">Registrer n\u00e5r prepp er laget. Varsler n\u00e5r holdbarheten g\u00e5r ut.</div>`;

  if (items.length === 0) {
    html += `<div style="padding:12px 0;font-size:13px;color:var(--muted)">Ingen registreringer enn\u00e5.</div>`;
  }

  // Sort by expiry
  const sorted = items.map((item, i) => ({...item, _i: i})).sort((a,b) => (a.expiry||0) - (b.expiry||0));

  sorted.forEach(item => {
    const i = item._i;
    const expiry = item.expiry || 0;
    const hoursLeft = expiry > 0 ? Math.round((expiry - now) / 3600000 * 10) / 10 : 0;
    const expired = expiry > 0 && expiry < now;
    const warning = hoursLeft > 0 && hoursLeft <= 4;
    const stClass = expired ? 'stock-empty' : warning ? 'stock-low' : 'stock-ok';
    const stLabel = expired ? 'Utg\u00e5tt' : hoursLeft <= 0 ? '' : hoursLeft < 1 ? Math.round(hoursLeft*60) + ' min' : Math.round(hoursLeft) + 't igjen';

    html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);${expired?'opacity:0.5':''}">
      <span style="flex:2;font-weight:600;font-size:13px">${esc(item.name)}</span>
      <span style="font-size:11px;color:var(--muted)">${esc(item.laget || '')}</span>
      <span class="stock-status ${stClass}" style="font-size:10px;padding:2px 8px">${stLabel}</span>
      <button class="icon-btn del" onclick="S.holdbarhet.splice(${i},1);scheduleSave();render()">\u00d7</button>
    </div>`;
  });

  html += `<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">`;
  // Quick-add buttons for common items
  const presets = ['The Smash Sauce', 'The Smash Hot Sauce', 'Karamellisert l\u00f8k', 'Coleslaw'];
  presets.forEach(name => {
    html += `<button class="add-row" style="width:auto;padding:5px 12px;font-size:12px" onclick="addHoldbarhet('${name}')">${esc(name)}</button>`;
  });
  html += `<button class="add-row" style="width:auto;padding:5px 12px;font-size:12px" onclick="addHoldbarhet(prompt('Navn p\u00e5 produkt:')||'')">+ Annet</button>`;
  html += `</div>`;

  html += `</div>`;
  return html;
}

function addHoldbarhet(name) {
  if (!name) return;
  if (!S.holdbarhet) S.holdbarhet = [];
  const now = new Date();
  const hours = name.toLowerCase().includes('saus') || name.toLowerCase().includes('sauce') ? 24 : 48;
  S.holdbarhet.push({
    name: name,
    laget: now.toLocaleDateString('no-NO', {day:'numeric',month:'short'}) + ' ' + now.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'}),
    created: Date.now(),
    expiry: Date.now() + (hours * 3600000),
    hours: hours
  });
  scheduleSave();
  render();
  toast(name + ' registrert \u2014 ' + hours + 't holdbarhet');
}

function avsluttDag() {
  if (!confirm('Avslutt dagen? Lagrer salgsdata og nullstiller tellere.')) return;
  if (!S.dagligLogg) S.dagligLogg = [];

  const now = new Date();
  const salg = [
    ...S.burgers.map(b => ({name: b.name, antall: b.solgt || 0})),
    ...S.sider.map(s => ({name: s.name, antall: s.solgt || 0}))
  ];
  const totalSolgt = salg.reduce((a, s) => a + s.antall, 0);

  // Snapshot lagerbeholdning
  const lagerSnapshot = LIB.map(l => ({n: l.n, stock: l.stock, unit: l.unit}));

  S.dagligLogg.push({
    dato: now.toLocaleDateString('no-NO', {weekday:'short', day:'numeric', month:'short', year:'numeric'}),
    timestamp: Date.now(),
    salg: salg,
    totalSolgt: totalSolgt,
    lager: lagerSnapshot
  });

  // Nullstill salg
  S.burgers.forEach(b => { b.solgt = 0; b.utsolgt = false; });
  S.sider.forEach(s => { s.solgt = 0; s.utsolgt = false; });

  // Nullstill sjekklister
  if (S.sjekklister) {
    Object.values(S.sjekklister).forEach(list => list.forEach(i => i.done = false));
  }

  // Fjern utg\u00e5tt holdbarhet
  if (S.holdbarhet) {
    S.holdbarhet = S.holdbarhet.filter(h => h.expiry > Date.now());
  }

  scheduleSave();
  render();
  toast('Dag avsluttet \u2014 ' + totalSolgt + ' solgt');
}

      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${esc(e.tittel)}</div>
        <div style="font-size:11px;color:var(--muted)">${dateStr}${e.tid?' \u00b7 '+esc(e.tid):''}${e.notat?' \u2014 '+esc(e.notat):''}</div>

function addKalenderEvent(type) {
  const tittel = prompt(type === 'vogn' ? 'Lokasjon / beskrivelse:' : type === 'bestilling' ? 'Hva bestilles:' : 'Tittel:');
  if (!tittel) return;
  const datoStr = prompt('Dato (YYYY-MM-DD):');
  if (!datoStr) return;
  const tid = prompt('Tidspunkt (valgfritt):', '') || '';
  const notat = prompt('Notat (valgfritt):', '') || '';

  if (!S.kalender) S.kalender = [];
  S.kalender.push({
    type: type,
    tittel: tittel,
    dato: new Date(datoStr).getTime(),
    tid: tid,
    notat: notat,
    done: false
  });
  scheduleSave();
  render();
  toast('Hendelse lagt til');
}
